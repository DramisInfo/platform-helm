name: Helm Lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Lint platform-core
        run: helm lint platform-core
