apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xcertmanageridentity-azure
spec:
  compositeTypeRef:
    apiVersion: platform.dramisinfo.com/v1alpha1
    kind: XCertManagerIdentity
  mode: Pipeline
  pipeline:
    # ── Step 1: Observe OIDC issuer URL from the Arc Workload Identity ConfigMap ──
    # Reads azure-clusterconfig-wi in the azure-arc namespace (written by the
    # wiextension Helm release on every Arc-enabled cluster) and propagates
    # ISSUER_URL into status.oidcIssuer so downstream steps can use it without
    # any cluster-specific spec fields.
    - step: observe-oidc-config
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: observe-oidc-config
            base:
              apiVersion: kubernetes.m.crossplane.io/v1alpha1
              kind: Object
              spec:
                managementPolicies:
                  - Observe
                providerConfigRef:
                  name: default
                  kind: ClusterProviderConfig
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      name: azure-clusterconfig-wi
                      namespace: azure-arc
            patches:
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.manifest.data.ISSUER_URL
                toFieldPath: status.oidcIssuer
                policy:
                  fromFieldPath: Optional

    # ── Step 2: Create/patch all Azure and in-cluster resources ──
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:

          # ──────────────────────────────────────────────────────────────────
          # 1. User Assigned Identity for cert-manager
          #    Outputs clientId, principalId, and full ARM resource ID to XR status.
          # ──────────────────────────────────────────────────────────────────
          - name: umi
            base:
              apiVersion: managedidentity.azure.m.upbound.io/v1beta1
              kind: UserAssignedIdentity
              spec:
                forProvider:
                  name: ""            # patched from spec.identityName
                  location: ""        # patched from spec.location
                  resourceGroupName: ""   # patched from spec.resourceGroup
                  tags:
                    managed-by: crossplane
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.identityName
                toFieldPath: spec.forProvider.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.location
                toFieldPath: spec.forProvider.location
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resourceGroup
                toFieldPath: spec.forProvider.resourceGroupName
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.tags.cluster
              # Propagate outputs to XR status for use by downstream resources
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.clientId
                toFieldPath: status.clientId
                policy:
                  fromFieldPath: Optional
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.principalId
                toFieldPath: status.principalId
                policy:
                  fromFieldPath: Optional
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.id
                toFieldPath: status.umiId
                policy:
                  fromFieldPath: Optional

          # ──────────────────────────────────────────────────────────────────
          # 2. Role Assignment: DNS Zone Contributor on the DNS resource group
          #    Grants cert-manager UMI the right to create TXT records.
          # ──────────────────────────────────────────────────────────────────
          - name: dns-role-assignment
            base:
              apiVersion: authorization.azure.m.upbound.io/v1beta1
              kind: RoleAssignment
              spec:
                forProvider:
                  scope: ""                       # patched from spec.dnsRoleScope
                  roleDefinitionName: DNS Zone Contributor
                  principalId: ""                 # patched from status.principalId (once UMI exists)
                  principalType: ServicePrincipal
                  skipServicePrincipalAadCheck: true
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.dnsRoleScope
                toFieldPath: spec.forProvider.scope
              - type: FromCompositeFieldPath
                fromFieldPath: status.principalId
                toFieldPath: spec.forProvider.principalId
                policy:
                  fromFieldPath: Required

          # ──────────────────────────────────────────────────────────────────
          # 3. Federated Identity Credential
          #    Binds cert-manager's SA to the UMI via the cluster's OIDC issuer.
          # ──────────────────────────────────────────────────────────────────
          - name: federated-credential
            base:
              apiVersion: managedidentity.azure.m.upbound.io/v1beta1
              kind: FederatedIdentityCredential
              spec:
                forProvider:
                  audience:
                    - api://AzureADTokenExchange
                  issuer: ""            # patched from status.oidcIssuer (observed from azure-clusterconfig-wi)
                  parentId: ""          # patched from status.umiId (full ARM resource ID)
                  resourceGroupName: "" # patched from spec.resourceGroup
                  subject: system:serviceaccount:cert-manager:cert-manager
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: status.oidcIssuer
                toFieldPath: spec.forProvider.issuer
                policy:
                  fromFieldPath: Required
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resourceGroup
                toFieldPath: spec.forProvider.resourceGroupName
              - type: FromCompositeFieldPath
                fromFieldPath: status.umiId
                toFieldPath: spec.forProvider.parentId
                policy:
                  fromFieldPath: Required

          # ──────────────────────────────────────────────────────────────────
          # 4. cert-manager ServiceAccount — add Azure WI annotations
          #    The Azure WI webhook reads these at pod creation time to inject
          #    the OIDC token. managementPolicies Observe+Update: cert-manager
          #    Helm still owns this SA; we just add the WI fields.
          # ──────────────────────────────────────────────────────────────────
          - name: certmanager-sa
            base:
              apiVersion: kubernetes.m.crossplane.io/v1alpha1
              kind: Object
              spec:
                managementPolicies:
                  - Observe
                  - Update
                providerConfigRef:
                  name: default
                  kind: ClusterProviderConfig
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ServiceAccount
                    metadata:
                      name: cert-manager
                      namespace: cert-manager
                      annotations:
                        azure.workload.identity/client-id: ""   # patched from status.clientId
                        azure.workload.identity/tenant-id: ""   # patched from spec.tenantId
                      labels:
                        azure.workload.identity/use: "true"
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: status.clientId
                toFieldPath: "spec.forProvider.manifest.metadata.annotations[azure.workload.identity/client-id]"
                policy:
                  fromFieldPath: Required
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenantId
                toFieldPath: "spec.forProvider.manifest.metadata.annotations[azure.workload.identity/tenant-id]"

          # ──────────────────────────────────────────────────────────────────
          # 5. cert-manager Deployment — add azure.workload.identity/use: "true"
          #    to the pod template labels. The WI webhook only injects the OIDC
          #    token when this label is present on the pod at creation time.
          #    Adding this label triggers a rolling restart of cert-manager, which
          #    is necessary for the WI webhook to inject the token into new pods.
          # ──────────────────────────────────────────────────────────────────
          - name: certmanager-deployment
            base:
              apiVersion: kubernetes.m.crossplane.io/v1alpha1
              kind: Object
              spec:
                managementPolicies:
                  - Observe
                  - Update
                providerConfigRef:
                  name: default
                  kind: ClusterProviderConfig
                forProvider:
                  manifest:
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                      name: cert-manager
                      namespace: cert-manager
                    spec:
                      template:
                        metadata:
                          labels:
                            azure.workload.identity/use: "true"

          # ──────────────────────────────────────────────────────────────────
          # 6. ClusterIssuer (letsencrypt-prd)
          #    Fully managed by Crossplane (no longer in cert-manager ArgoCD app).
          #    Created only once clientId is available (policy: Required on patch).
          # ──────────────────────────────────────────────────────────────────
          - name: certmanager-clusterissuer
            base:
              apiVersion: kubernetes.m.crossplane.io/v1alpha1
              kind: Object
              spec:
                providerConfigRef:
                  name: default
                  kind: ClusterProviderConfig
                forProvider:
                  manifest:
                    apiVersion: cert-manager.io/v1
                    kind: ClusterIssuer
                    metadata:
                      name: letsencrypt-prd
                    spec:
                      acme:
                        email: ""           # patched from spec.certManagerEmail
                        server: ""          # patched from spec.acmeServer
                        privateKeySecretRef:
                          name: letsencrypt-prd-account-key
                        solvers:
                          - dns01:
                              azureDNS:
                                subscriptionID: ""    # patched from spec.subscriptionId
                                resourceGroupName: "" # patched from spec.dnsResourceGroup
                                hostedZoneName: ""    # patched from spec.clusterName + .dramisinfo.com
                                environment: AzurePublicCloud
                                managedIdentity:
                                  clientID: ""        # patched from status.clientId
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.certManagerEmail
                toFieldPath: spec.forProvider.manifest.spec.acme.email
              - type: FromCompositeFieldPath
                fromFieldPath: spec.acmeServer
                toFieldPath: spec.forProvider.manifest.spec.acme.server
              - type: FromCompositeFieldPath
                fromFieldPath: spec.subscriptionId
                toFieldPath: spec.forProvider.manifest.spec.acme.solvers[0].dns01.azureDNS.subscriptionID
              - type: FromCompositeFieldPath
                fromFieldPath: spec.dnsResourceGroup
                toFieldPath: spec.forProvider.manifest.spec.acme.solvers[0].dns01.azureDNS.resourceGroupName
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.manifest.spec.acme.solvers[0].dns01.azureDNS.hostedZoneName
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s.dramisinfo.com"
              - type: FromCompositeFieldPath
                fromFieldPath: status.clientId
                toFieldPath: spec.forProvider.manifest.spec.acme.solvers[0].dns01.azureDNS.managedIdentity.clientID
                policy:
                  fromFieldPath: Required
