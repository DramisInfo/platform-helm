apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xesoidentities.platform.dramisinfo.com
spec:
  # Cluster-scoped: no claimNames, XEsoIdentity instances live directly
  # as cluster-scoped objects in platform-tools (one per cluster).
  scope: Cluster
  group: platform.dramisinfo.com
  names:
    kind: XEsoIdentity
    plural: xesoidentities
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - resourceGroup
                - location
                - sharedAkvScope
                - sharedAkvUrl
                - clusterName
              properties:
                clusterName:
                  type: string
                  description: Cluster name used for tagging (e.g. cace-1-dev)
                resourceGroup:
                  type: string
                  description: Azure RG where the ESO UMI is created (rg-<clusterName>)
                location:
                  type: string
                  description: Azure region for the UMI (e.g. canadacentral)
                identityName:
                  type: string
                  description: Azure UMI name (e.g. umi-cace-1-dev-eso)
                sharedAkvScope:
                  type: string
                  description: Full ARM scope of the shared AKV for role assignment
                sharedAkvUrl:
                  type: string
                  description: Vault URL for the ClusterSecretStore (e.g. https://akv-dramisinfo-shared.vault.azure.net/)
                tenantId:
                  type: string
                  description: Azure tenant ID for WI annotation
                  default: "b66f9c3b-d384-4932-92fd-444edca3620f"
            status:
              type: object
              properties:
                oidcIssuer:
                  type: string
                  description: OIDC issuer URL observed from azure-clusterconfig-wi ConfigMap in azure-arc namespace
                clientId:
                  type: string
                  description: Client ID of the created ESO UMI
                principalId:
                  type: string
                  description: Principal (Object) ID of the created ESO UMI
                umiId:
                  type: string
                  description: Full ARM resource ID of the created UMI (for FederatedIdentityCredential parentId)
