apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xazureworkloadidentity-azure
spec:
  compositeTypeRef:
    apiVersion: platform.dramisinfo.com/v1alpha1
    kind: XAzureWorkloadIdentity
  mode: Pipeline
  pipeline:

    # ── Step 1: Observe OIDC issuer + provision UMI ──────────────────────────
    # Reads azure-clusterconfig-wi from the azure-arc namespace (written by the
    # wiextension Helm release) and propagates ISSUER_URL into status.oidcIssuer.
    # Also creates the User Assigned Identity and surfaces clientId, principalId,
    # and the full ARM id (umiId) into XR status for downstream steps.
    - step: observe-and-provision-identity
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:

          - name: observe-oidc-config
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              spec:
                managementPolicies:
                  - Observe
                providerConfigRef:
                  name: default
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ConfigMap
                    metadata:
                      name: azure-clusterconfig-wi
                      namespace: azure-arc
            patches:
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.manifest.data.ISSUER_URL
                toFieldPath: status.oidcIssuer
                policy:
                  fromFieldPath: Optional

          - name: umi
            base:
              apiVersion: managedidentity.azure.upbound.io/v1beta1
              kind: UserAssignedIdentity
              spec:
                forProvider:
                  name: ""
                  location: ""
                  resourceGroupName: ""
                  tags:
                    managed-by: crossplane
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.identityName
                toFieldPath: spec.forProvider.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.location
                toFieldPath: spec.forProvider.location
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resourceGroup
                toFieldPath: spec.forProvider.resourceGroupName
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.tags.cluster
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.clientId
                toFieldPath: status.clientId
                policy:
                  fromFieldPath: Optional
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.principalId
                toFieldPath: status.principalId
                policy:
                  fromFieldPath: Optional
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.id
                toFieldPath: status.umiId
                policy:
                  fromFieldPath: Optional

    # ── Step 2: Conditionally render all remaining resources ─────────────────
    # Uses function-go-templating so each optional feature block (role assignment,
    # federated credential, SA annotation, annotateDeployment, clusterSecretStore,
    # clusterIssuer, outputConfigMap) is only rendered when the required spec fields
    # are present and the UMI status values are available from the previous step.
    #
    # Dependency order within a single reconcile loop:
    #   • principalId available  → role-assignment rendered
    #   • umiId + oidcIssuer     → federated-credential rendered
    #   • clientId available     → sa-annotation, and all optional extras rendered
    #
    # On the first reconcile the UMI is created but status is empty, so only the
    # UMI and OIDC observation run. Subsequent loops progressively add resources
    # as the UMI becomes ready and status fields are populated.
    - step: manage-workload-identity-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr     := .observed.composite.resource }}
            {{- $spec   := $xr.spec }}
            {{- $status := $xr.status }}
            {{- $principalId := default "" $status.principalId }}
            {{- $umiId       := default "" $status.umiId }}
            {{- $oidcIssuer  := default "" $status.oidcIssuer }}
            {{- $clientId    := default "" $status.clientId }}

            {{- /* ── Role Assignment ──────────────────────────────────────── */}}
            {{- /* Only rendered once the UMI's principalId is available.     */}}
            {{ if $principalId }}
            ---
            apiVersion: authorization.azure.upbound.io/v1beta1
            kind: RoleAssignment
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: role-assignment
            spec:
              forProvider:
                scope: {{ $spec.roleAssignment.scope }}
                roleDefinitionName: {{ $spec.roleAssignment.roleName }}
                principalId: {{ $principalId }}
                principalType: ServicePrincipal
                skipServicePrincipalAadCheck: true
            {{ end }}

            {{- /* ── Federated Identity Credential ──────────────────────── */}}
            {{- /* Binds the SA subject to the UMI via the cluster OIDC issuer. */}}
            {{ if and $umiId $oidcIssuer }}
            ---
            apiVersion: managedidentity.azure.upbound.io/v1beta1
            kind: FederatedIdentityCredential
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: federated-credential
            spec:
              forProvider:
                audience:
                  - api://AzureADTokenExchange
                issuer: {{ $oidcIssuer }}
                parentId: {{ $umiId }}
                resourceGroupName: {{ $spec.resourceGroup }}
                subject: "system:serviceaccount:{{ $spec.serviceAccount.namespace }}:{{ $spec.serviceAccount.name }}"
            {{ end }}

            {{- /* ── ServiceAccount WI Annotation ─────────────────────────── */}}
            {{- /* Annotates the workload SA so the Azure WI webhook injects    */}}
            {{- /* the OIDC token volume at pod creation time.                  */}}
            {{ if $clientId }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: workload-identity-sa
            spec:
              managementPolicies:
                - Observe
                - Update
              providerConfigRef:
                name: default
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ServiceAccount
                  metadata:
                    name: {{ $spec.serviceAccount.name }}
                    namespace: {{ $spec.serviceAccount.namespace }}
                    annotations:
                      azure.workload.identity/client-id: "{{ $clientId }}"
                      azure.workload.identity/tenant-id: "{{ $spec.tenantId }}"
                    labels:
                      azure.workload.identity/use: "true"
            {{ end }}

            {{- /* ── Annotate Deployment (optional) ───────────────────────── */}}
            {{- /* Patches the named Deployment with azure.workload.identity/use */}}
            {{- /* so the WI webhook picks up pod restarts (cert-manager pattern). */}}
            {{ if and $spec.annotateDeployment $clientId }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: workload-identity-deployment
            spec:
              managementPolicies:
                - Observe
                - Update
              providerConfigRef:
                name: default
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: {{ $spec.annotateDeployment.name }}
                    namespace: {{ $spec.annotateDeployment.namespace }}
                  spec:
                    template:
                      metadata:
                        labels:
                          azure.workload.identity/use: "true"
            {{ end }}

            {{- /* ── ClusterSecretStore (optional) ────────────────────────── */}}
            {{- /* Creates an ESO ClusterSecretStore backed by the given AKV.  */}}
            {{- /* Rendered only when spec.clusterSecretStore is set.          */}}
            {{ if and $spec.clusterSecretStore $clientId }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cluster-secret-store
            spec:
              providerConfigRef:
                name: default
              forProvider:
                manifest:
                  apiVersion: external-secrets.io/v1beta1
                  kind: ClusterSecretStore
                  metadata:
                    name: {{ default "azure-keyvault-shared" $spec.clusterSecretStore.name }}
                  spec:
                    provider:
                      azurekv:
                        authType: WorkloadIdentity
                        vaultUrl: {{ $spec.clusterSecretStore.vaultUrl }}
                        serviceAccountRef:
                          name: {{ $spec.serviceAccount.name }}
                          namespace: {{ $spec.serviceAccount.namespace }}
            {{ end }}

            {{- /* ── ClusterIssuer (optional) ──────────────────────────────── */}}
            {{- /* Creates a cert-manager ClusterIssuer with AzureDNS DNS01.    */}}
            {{- /* Rendered only when spec.clusterIssuer is set.                */}}
            {{ if and $spec.clusterIssuer $clientId }}
            {{- $ci := $spec.clusterIssuer }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: cert-manager-clusterissuer
            spec:
              providerConfigRef:
                name: default
              forProvider:
                manifest:
                  apiVersion: cert-manager.io/v1
                  kind: ClusterIssuer
                  metadata:
                    name: {{ default "letsencrypt-prd" $ci.name }}
                  spec:
                    acme:
                      email: {{ default "frederic.simard@dramisinfo.com" $ci.email }}
                      server: {{ default "https://acme-v02.api.letsencrypt.org/directory" $ci.acmeServer }}
                      privateKeySecretRef:
                        name: {{ default "letsencrypt-prd" $ci.name }}-account-key
                      solvers:
                        - dns01:
                            azureDNS:
                              subscriptionID: {{ default "c1d22d5c-418b-4bd9-ba23-5e806c376b56" $ci.subscriptionId }}
                              resourceGroupName: {{ default "rg-dns" $ci.dnsResourceGroup }}
                              hostedZoneName: {{ $spec.clusterName }}.dramisinfo.com
                              environment: AzurePublicCloud
                              managedIdentity:
                                clientID: {{ $clientId }}
            {{ end }}

            {{- /* ── Output ConfigMap (optional) ─────────────────────────────── */}}
            {{- /* Writes UMI identity values into a ConfigMap so other resources  */}}
            {{- /* (e.g. other Compositions or plain K8s manifests) can read them  */}}
            {{- /* without accessing Crossplane XR status directly.                */}}
            {{ if and $spec.outputConfigMap $clientId }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: umi-output-configmap
            spec:
              providerConfigRef:
                name: default
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ConfigMap
                  metadata:
                    name: {{ $spec.outputConfigMap.name }}
                    namespace: {{ $spec.outputConfigMap.namespace }}
                  data:
                    clientId: "{{ $clientId }}"
                    principalId: "{{ $principalId }}"
                    umiId: "{{ $umiId }}"
                    tenantId: "{{ $spec.tenantId }}"
            {{ end }}
