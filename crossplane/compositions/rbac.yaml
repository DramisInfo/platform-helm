# RBAC for provider-kubernetes running under the Crossplane service account.
# Grants permissions for all resources managed by XAzureWorkloadIdentity compositions:
#   • ServiceAccounts        (Observe+Update WI annotations)
#   • Deployments            (Observe+Update WI label — cert-manager pattern)
#   • ClusterIssuers         (full lifecycle — cert-manager)
#   • ClusterSecretStores    (full lifecycle — ESO)
#   • ConfigMaps             (full lifecycle — optional outputConfigMap)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-workload-identity-manager
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["external-secrets.io"]
    resources: ["clustersecretstores"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-workload-identity-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-workload-identity-manager
subjects:
  # provider-kubernetes uses the crossplane service account when ProviderConfig
  # source is InjectedIdentity.
  - kind: ServiceAccount
    name: crossplane
    namespace: crossplane-system
