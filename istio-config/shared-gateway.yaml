apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: shared-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*.cace-1-dev.dramisinfo.com"
      tls:
        httpsRedirect: true
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - "*.cace-1-dev.dramisinfo.com"
      tls:
        mode: SIMPLE
        credentialName: istio-wildcard-tls-cert
    - port:
        number: 4222
        name: nats-client
        protocol: TCP
      hosts:
        - "nats.cace-1-dev.dramisinfo.com"
    - port:
        number: 7222
        name: nats-gateway
        protocol: TCP
      hosts:
        - "nats.cace-1-dev.dramisinfo.com"
