{{- if .Values.bootstrap.atlas.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atlas-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-90"
spec:
  destination:
    namespace: atlas-operator
    server: "https://kubernetes.default.svc"
  project: platform-data
  source:
    repoURL: "oci://ghcr.io/ariga/charts"
    targetRevision: "0.7.15"
    chart: atlas-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipHooks=true
      - Timeout=600
      - Validate=false
      - Wait=true
      - PruneEmpty=true
    {{- include "platform-core.defaultRetry" . | nindent 4 }}
{{- end -}}
