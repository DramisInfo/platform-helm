{{- if .Values.bootstrap.certManager.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-110"
spec:
  destination:
    namespace: cert-manager
    server: "https://kubernetes.default.svc"
  project: default
  sources:
    - repoURL: "https://charts.jetstack.io"
      targetRevision: "v1.16.2"
      chart: cert-manager
      helm:
        valuesObject:
          crds:
            enabled: true
            keep: true
          # Gateway API support graduated to GA in cert-manager v1.15 and requires
          # no feature gate — it is enabled automatically when Gateway API CRDs are present.
          global:
            leaderElection:
              namespace: cert-manager
{{- if .Values.bootstrap.certManager.workloadIdentity.enabled }}
          # Azure Workload Identity for DNS01 challenge
          serviceAccount:
            annotations:
              azure.workload.identity/client-id: {{ .Values.bootstrap.certManager.workloadIdentity.clientId }}
              azure.workload.identity/tenant-id: {{ .Values.bootstrap.certManager.workloadIdentity.tenantId }}
            labels:
              azure.workload.identity/use: "true"
          podLabels:
            azure.workload.identity/use: "true"
{{- end }}
{{- if .Values.bootstrap.certManager.clusterIssuer.enabled }}
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: cert-manager.io/v1
              kind: ClusterIssuer
              metadata:
                name: letsencrypt-prd
                namespace: cert-manager
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                acme:
                  email: frederic.simard@dramisinfo.com
                  server: https://acme-v02.api.letsencrypt.org/directory
                  privateKeySecretRef:
                    name: example-issuer-account-key
                  solvers:
                    - dns01:
                        azureDNS:
                          subscriptionID: c1d22d5c-418b-4bd9-ba23-5e806c376b56
                          resourceGroupName: rg-dns
                          hostedZoneName: {{ .Values.global.clusterName }}.dramisinfo.com
                          environment: AzurePublicCloud
                          managedIdentity:
                            clientID: bc1b708f-94a6-428d-ba6e-983a5ade07ba
{{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipHooks=true
      - Timeout=600
      - Validate=false
      - Wait=true
      - PruneEmpty=true
{{- end -}}
