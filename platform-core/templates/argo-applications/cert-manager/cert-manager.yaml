{{- if .Values.bootstrap.certManager.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-110"
spec:
  destination:
    namespace: cert-manager
    server: "https://kubernetes.default.svc"
  project: default
  source:
    repoURL: "https://charts.jetstack.io"
    targetRevision: "v1.16.2"
    chart: cert-manager
    helm:
      valuesObject:
        crds:
          enabled: true
          keep: true
        config:
          apiVersion: controller.config.cert-manager.io/v1alpha1
          kind: ControllerConfiguration
          enableGatewayAPI: true
        global:
          leaderElection:
            namespace: cert-manager
        # Note: Azure Workload Identity (SA annotation + pod label) and the
        # ClusterIssuer are managed by the crossplane-compositions app via the
        # XCertManagerIdentity Composition. This avoids the chicken-and-egg problem
        # of needing the UMI client ID at cert-manager deploy time.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipHooks=true
      - Timeout=600
      - Validate=false
      - Wait=true
      - PruneEmpty=true
    {{- include "platform-core.defaultRetry" . | nindent 4 }}
{{- end -}}
