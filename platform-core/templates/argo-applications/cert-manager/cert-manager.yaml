{{- if .Values.bootstrap.certManager.enabled -}}
{{- $certManagerIdentityEnabled := and .Values.bootstrap.crossplane.enabled .Values.bootstrap.crossplane.certManagerIdentity.enabled -}}
{{- $az := .Values.bootstrap.crossplane.azure -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave -107: after crossplane-compositions (-109) has registered the XRD so the
    # XAzureWorkloadIdentity CR in this app's multi-source can apply cleanly.
    # Within this app, cert-manager Helm runs at wave 0, then XAzureWorkloadIdentity
    # at wave 1 — ensuring CRDs and the Deployment exist before the composition
    # tries to patch them or create the ClusterIssuer.
    argocd.argoproj.io/sync-wave: "-107"
spec:
  destination:
    namespace: cert-manager
    server: "https://kubernetes.default.svc"
  project: platform-foundations
  sources:
    - repoURL: "https://charts.jetstack.io"
      targetRevision: "v1.20.0"
      chart: cert-manager
      helm:
        valuesObject:
          crds:
            enabled: true
            keep: true
          config:
            apiVersion: controller.config.cert-manager.io/v1alpha1
            kind: ControllerConfiguration
            enableGatewayAPI: true
          global:
            leaderElection:
              namespace: cert-manager
    {{- if $certManagerIdentityEnabled }}
    # XAzureWorkloadIdentity (generic): creates the cert-manager UMI, grants DNS Zone
    # Contributor on the DNS resource group, binds the federated credential, annotates
    # the cert-manager SA and Deployment with WI labels, and creates the ClusterIssuer.
    # Placed here so cert-manager and its Azure identity lifecycle are managed together.
    # Inner sync-wave 1: syncs AFTER the cert-manager Helm resources (wave 0) within
    # this app, ensuring cert-manager CRDs and the Deployment exist before the
    # composition tries to patch the Deployment and create the ClusterIssuer.
    # The parent cert-manager Application is at wave -107, which is after
    # crossplane-compositions (-109), so the XRD CRD is guaranteed to exist.
    # SkipDryRunOnMissingResource=true handles any edge cases on first bootstrap.
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: platform.dramisinfo.com/v1alpha1
              kind: XAzureWorkloadIdentity
              metadata:
                name: {{ .Values.global.clusterName }}-certmanager
                annotations:
                  argocd.argoproj.io/sync-wave: "1"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                clusterName: {{ .Values.global.clusterName }}
                resourceGroup: rg-{{ .Values.global.clusterName }}
                location: {{ $az.location }}
                identityName: umi-{{ .Values.global.clusterName }}-certmanager
                serviceAccount:
                  name: cert-manager
                  namespace: cert-manager
                roleAssignment:
                  scope: /subscriptions/{{ $az.subscriptionId }}/resourceGroups/{{ $az.dnsResourceGroup }}
                  roleName: DNS Zone Contributor
                annotateDeployment:
                  name: cert-manager
                  namespace: cert-manager
                clusterIssuer:
                  acmeServer: "https://acme-v02.api.letsencrypt.org/directory"
    {{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - SkipHooks=true
      - Timeout=600
      - Validate=false
      - Wait=true
      - PruneEmpty=true
    {{- include "platform-core.defaultRetry" . | nindent 4 }}
{{- end -}}
