{{- if .Values.bootstrap.certManager.enabled -}}
{{- $certManagerIdentityEnabled := and .Values.bootstrap.crossplane.enabled .Values.bootstrap.crossplane.certManagerIdentity.enabled -}}
{{- $az := .Values.bootstrap.crossplane.azure -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave -107: after crossplane-compositions (-109) has registered the XRD so the
    # XCertManagerIdentity CR in this app's multi-source can apply cleanly.
    # cert-manager itself has no dependency on crossplane, so the wave change is safe.
    argocd.argoproj.io/sync-wave: "-107"
spec:
  destination:
    namespace: cert-manager
    server: "https://kubernetes.default.svc"
  project: default
  sources:
    - repoURL: "https://charts.jetstack.io"
      targetRevision: "v1.16.2"
      chart: cert-manager
      helm:
        valuesObject:
          crds:
            enabled: true
            keep: true
          config:
            apiVersion: controller.config.cert-manager.io/v1alpha1
            kind: ControllerConfiguration
            enableGatewayAPI: true
          global:
            leaderElection:
              namespace: cert-manager
    {{- if $certManagerIdentityEnabled }}
    # XCertManagerIdentity: drives the Crossplane Composition that creates the
    # cert-manager UMI, DNS Zone Contributor role assignment, and Federated
    # Identity Credential in Azure. Placed here so cert-manager and its Azure
    # identity lifecycle are managed together.
    # Inner sync-wave -108: syncs before the cert-manager Helm resources (wave 0)
    # within this app. The parent cert-manager Application is at wave -107, which
    # is after crossplane-compositions (-109), so the XRD CRD is guaranteed to
    # exist before this CR is applied.
    # SkipDryRunOnMissingResource=true handles any edge cases on first bootstrap.
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: platform.dramisinfo.com/v1alpha1
              kind: XCertManagerIdentity
              metadata:
                name: {{ .Values.global.clusterName }}-certmanager
                annotations:
                  argocd.argoproj.io/sync-wave: "-108"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                clusterName: {{ .Values.global.clusterName }}
                resourceGroup: rg-{{ .Values.global.clusterName }}
                location: {{ $az.location }}
                dnsRoleScope: /subscriptions/{{ $az.subscriptionId }}/resourceGroups/{{ $az.dnsResourceGroup }}
                identityName: umi-{{ .Values.global.clusterName }}-certmanager
    {{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - SkipHooks=true
      - Timeout=600
      - Validate=false
      - Wait=true
      - PruneEmpty=true
    {{- include "platform-core.defaultRetry" . | nindent 4 }}
{{- end -}}
