{{- if and .Values.bootstrap.crossplane.enabled .Values.bootstrap.crossplane.workloadIdentity.enabled (ne .Values.bootstrap.crossplane.workloadIdentity.clientId "") -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-crossplane-compositions
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave -109: runs after crossplane-config (-111) is Healthy so all provider
    # CRDs and functions are installed and their CRDs are registered.
    argocd.argoproj.io/sync-wave: "-109"
spec:
  destination:
    namespace: crossplane-system
    server: "https://kubernetes.default.svc"
  project: platform-infra
  sources:
    - repoURL: "https://github.com/DramisInfo/platform-crossplane-compositions.git"
      targetRevision: HEAD
      path: .
      directory:
        recurse: true
    {{- if .Values.bootstrap.crossplane.dynamicDns.enabled }}
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: platform.dramisinfo.com/v1alpha1
              kind: XDynamicDnsRecord
              metadata:
                name: vpn-dramisinfo
                annotations:
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                subscriptionId: {{ .Values.bootstrap.crossplane.dynamicDns.subscriptionId | quote }}
                recordName: {{ .Values.bootstrap.crossplane.dynamicDns.recordName | quote }}
                zoneName: {{ .Values.bootstrap.crossplane.dynamicDns.zoneName | quote }}
                resourceGroupName: {{ .Values.bootstrap.crossplane.dynamicDns.resourceGroupName | quote }}
                ttl: {{ .Values.bootstrap.crossplane.dynamicDns.ttl }}
    {{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - Validate=false
      - Wait=true
      - PruneEmpty=true
    {{- include "platform-core.extendedRetry" . | nindent 4 }}
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - '.spec.data[].remoteRef.conversionStrategy'
        - '.spec.data[].remoteRef.decodingStrategy'
        - '.spec.data[].remoteRef.metadataPolicy'
{{- end }}
