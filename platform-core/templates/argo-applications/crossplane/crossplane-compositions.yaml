{{- if and .Values.bootstrap.crossplane.enabled .Values.bootstrap.crossplane.workloadIdentity.enabled (ne .Values.bootstrap.crossplane.workloadIdentity.clientId "") -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-crossplane-compositions
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave -109: runs after crossplane-config (-111) is Healthy so all provider
    # CRDs and functions are installed and their CRDs are registered.
    argocd.argoproj.io/sync-wave: "-109"
spec:
  destination:
    namespace: crossplane-system
    server: "https://kubernetes.default.svc"
  project: platform-infra
  source:
    repoURL: "https://github.com/DramisInfo/platform-crossplane-compositions.git"
    targetRevision: HEAD
    path: .
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - Validate=false
    {{- include "platform-core.extendedRetry" . | nindent 4 }}
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - '.spec.data[].remoteRef.conversionStrategy'
        - '.spec.data[].remoteRef.decodingStrategy'
        - '.spec.data[].remoteRef.metadataPolicy'
{{- end }}
