{{- if and .Values.bootstrap.crossplane.enabled .Values.bootstrap.crossplane.workloadIdentity.enabled (ne .Values.bootstrap.crossplane.workloadIdentity.clientId "") -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave -111: runs after `crossplane` (wave -112) is Healthy.
    # At this point all Crossplane CRDs (DeploymentRuntimeConfig, Provider) are available.
    # ProviderConfig CRDs (azure.upbound.io, kubernetes.m.crossplane.io) are installed by
    # their respective providers once they start up — SkipDryRunOnMissingResource=true handles
    # the initial sync until they appear; selfHeal ensures they are applied on retry.
    argocd.argoproj.io/sync-wave: "-111"
spec:
  destination:
    namespace: crossplane-system
    server: "https://kubernetes.default.svc"
  project: platform-infra
  source:
    repoURL: "https://github.com/DramisInfo/crossplane-providers-and-functions.git"
    targetRevision: HEAD
    path: chart
    helm:
      valuesObject:
        azure:
          providerVersion: {{ .Values.bootstrap.crossplane.azure.providerVersion }}
          subscriptionId: {{ .Values.bootstrap.crossplane.azure.subscriptionId }}
          tenantId: {{ .Values.bootstrap.crossplane.workloadIdentity.tenantId }}
          clientId: {{ .Values.bootstrap.crossplane.workloadIdentity.clientId }}
        functions:
          patchAndTransformVersion: {{ .Values.bootstrap.crossplane.functionPatchAndTransformVersion }}
          goTemplatingVersion: {{ .Values.bootstrap.crossplane.functionGoTemplatingVersion }}
          autoReadyVersion: {{ .Values.bootstrap.crossplane.functionAutoReadyVersion }}
        providers:
          kubernetesVersion: {{ .Values.bootstrap.crossplane.providerKubernetesVersion }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - Validate=false
      - Wait=true
      - PruneEmpty=true
    {{- include "platform-core.defaultRetry" . | nindent 4 }}
{{- end }}
