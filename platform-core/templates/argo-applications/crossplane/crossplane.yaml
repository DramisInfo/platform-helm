{{- if .Values.bootstrap.crossplane.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
      argocd.argoproj.io/sync-wave: "-112"
spec:
  destination:
    namespace: crossplane-system
    server: "https://kubernetes.default.svc"
  project: platform-infra
  source:
    repoURL: "oci://xpkg.upbound.io/upbound/crossplane"
    targetRevision: "2.1.3-up.1"
    helm:
      valuesObject:
        metrics:
          enabled: true
{{- if and .Values.bootstrap.crossplane.workloadIdentity.enabled (ne .Values.bootstrap.crossplane.workloadIdentity.clientId "") }}
        # Azure Workload Identity for the Crossplane controller SA.
        # Provider pods reuse this SA via DeploymentRuntimeConfig in the
        # crossplane-config app (wave -111, deployed after this app is Healthy).
        customLabels:
          azure.workload.identity/use: "true"
        serviceAccount:
          customAnnotations:
            azure.workload.identity/client-id: {{ .Values.bootstrap.crossplane.workloadIdentity.clientId }}
            azure.workload.identity/tenant-id: {{ .Values.bootstrap.crossplane.workloadIdentity.tenantId }}
{{- else }}
        # Workload Identity not yet configured for this cluster.
        # Run terraform apply to populate bootstrap.crossplane.workloadIdentity.clientId
        # via the overlays/<cluster>/patches/crossplane-identity.yaml patch.
        serviceAccount:
          customAnnotations: {}
        customLabels: {}
{{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Validate=false
      - Wait=true
      - PruneEmpty=true
    {{- include "platform-core.defaultRetry" . | nindent 4 }}
{{- end -}}