{{- if and .Values.bootstrap.crossplane.enabled .Values.bootstrap.crossplane.workloadIdentity.enabled (ne .Values.bootstrap.crossplane.workloadIdentity.clientId "") -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-project-workspaces
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave -108: runs after platform-crossplane-compositions (-109) is Healthy
    # so the XProductWorkspace XRD is registered before any claims are applied.
    argocd.argoproj.io/sync-wave: "-108"
spec:
  destination:
    # No namespace here — XProductWorkspace is cluster-scoped.
    # Each manifest declares its own namespace if needed.
    server: "https://kubernetes.default.svc"
  project: product-workspaces
  source:
    repoURL: "https://github.com/DramisInfo/platform-project-workspaces.git"
    targetRevision: HEAD
    path: workspaces
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - Validate=false
      - RespectIgnoreDifferences=true
      - Replace=true
    {{- include "platform-core.extendedRetry" . | nindent 4 }}
{{- end }}
