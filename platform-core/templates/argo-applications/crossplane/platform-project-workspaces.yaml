{{- if and .Values.bootstrap.crossplane.enabled .Values.bootstrap.crossplane.workloadIdentity.enabled (ne .Values.bootstrap.crossplane.workloadIdentity.clientId "") -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-project-workspaces
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave -1: last application to sync before wave 0, ensuring the full platform
    # bootstrap (cert-manager, ESO, ingress, monitoring, etc.) is healthy first.
    # Product workspace claims should only be provisioned once the platform is stable.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  destination:
    # No namespace here — XProductWorkspace is cluster-scoped.
    # Each manifest declares its own namespace if needed.
    server: "https://kubernetes.default.svc"
  project: product-workspaces
  source:
    repoURL: "https://github.com/DramisInfo/platform-project-workspaces.git"
    targetRevision: HEAD
    path: bootstrap
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - Validate=false
      - RespectIgnoreDifferences=true
    {{- include "platform-core.extendedRetry" . | nindent 4 }}
{{- end }}
