{{- if and .Values.bootstrap.crossplane.enabled .Values.bootstrap.crossplane.productWorkspaceComposition.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: product-workspace-composition
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave -108: runs after crossplane-compositions (-109) so all provider CRDs,
    # functions, and provider configs are available before the XRD and Composition
    # are applied.
    argocd.argoproj.io/sync-wave: "-108"
spec:
  destination:
    namespace: crossplane-system
    server: "https://kubernetes.default.svc"
  project: default
  source:
    repoURL: "https://github.com/DramisInfo/product-workspace-composition.git"
    targetRevision: {{ .Values.bootstrap.crossplane.productWorkspaceComposition.targetRevision }}
    path: chart
    helm:
      valuesObject:
        githubOrg: {{ .Values.bootstrap.crossplane.productWorkspaceComposition.githubOrg }}
        argocdSourceRepos: {{ .Values.bootstrap.crossplane.productWorkspaceComposition.argocdSourceRepos | toJson }}
        providerConfigs:
          github: {{ .Values.bootstrap.crossplane.productWorkspaceComposition.providerConfigs.github }}
          kubernetes: {{ .Values.bootstrap.crossplane.productWorkspaceComposition.providerConfigs.kubernetes }}
          argocd: {{ .Values.bootstrap.crossplane.productWorkspaceComposition.providerConfigs.argocd }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - Validate=false
    {{- include "platform-core.extendedRetry" . | nindent 4 }}
{{- end }}
