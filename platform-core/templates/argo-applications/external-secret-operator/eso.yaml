{{- if .Values.bootstrap.externalSecretOperator.enabled }}
{{- $esoIdentityEnabled := and .Values.bootstrap.crossplane.enabled .Values.bootstrap.crossplane.esoIdentity.enabled -}}
{{- $az := .Values.bootstrap.crossplane.azure -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secret-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Wave -90: after crossplane-compositions (-109) has registered the XRD so the
    # XEsoIdentity CR in this app's multi-source can apply cleanly.
    argocd.argoproj.io/sync-wave: "-90"
spec:
  destination:
    namespace: eso
    server: "https://kubernetes.default.svc"
  project: platform-foundations
  sources:
    - repoURL: "https://charts.external-secrets.io"
      targetRevision: "2.0.1"
      chart: external-secrets
    {{- if $esoIdentityEnabled }}
    # XAzureWorkloadIdentity (generic): creates the ESO UMI, grants Key Vault Secrets
    # User on the shared AKV, binds the federated credential, annotates the ESO SA
    # with WI credentials, and creates the ClusterSecretStore.
    # Placed here so ESO and its Azure identity lifecycle are managed together.
    # Inner sync-wave -91: syncs before ESO Helm resources (wave 0) within this app.
    # SkipDryRunOnMissingResource=true handles any edge cases on first bootstrap.
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: platform.dramisinfo.com/v1alpha1
              kind: XAzureWorkloadIdentity
              metadata:
                name: {{ .Values.global.clusterName }}-eso
                annotations:
                  argocd.argoproj.io/sync-wave: "-91"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                clusterName: {{ .Values.global.clusterName }}
                resourceGroup: rg-{{ .Values.global.clusterName }}
                location: {{ $az.location }}
                identityName: umi-{{ .Values.global.clusterName }}-eso
                serviceAccount:
                  name: external-secrets
                  namespace: eso
                roleAssignment:
                  scope: {{ .Values.bootstrap.crossplane.esoIdentity.sharedAkvScope }}
                  roleName: Key Vault Secrets User
                clusterSecretStore:
                  vaultUrl: {{ .Values.bootstrap.crossplane.esoIdentity.sharedAkvUrl }}
    {{- end }}
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - SkipHooks=true
      - Timeout=600
      - Validate=false
      - Wait=true
      - PruneEmpty=true
    {{- include "platform-core.defaultRetry" . | nindent 4 }}
{{- end }}