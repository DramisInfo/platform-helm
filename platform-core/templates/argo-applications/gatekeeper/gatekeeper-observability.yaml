                        "pluginVersion": "9.4.7",
                        "targets": [
                          {
                            "datasource": "Prometheus",
                            "expr": "sum(rate(gatekeeper_audit_duration_seconds_sum[5m])) / sum(rate(gatekeeper_audit_duration_seconds_count[5m]))",
                            "refId": "A"
                          }
