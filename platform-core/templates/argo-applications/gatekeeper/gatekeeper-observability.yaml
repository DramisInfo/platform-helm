                        "title": "Avg Audit Duration",
                        "type": "stat"
                      },
                      {
                        "collapsed": false,
                        "gridPos": {
                          "h": 1,
                          "w": 24,
                          "x": 0,
                          "y": 9
                        },
                        "id": 101,
