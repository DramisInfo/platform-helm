{{- if and .Values.bootstrap.gatekeeper.enabled .Values.bootstrap.monitoring.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-observability
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  destination:
    namespace: monitoring
    server: "https://kubernetes.default.svc"
  project: default
  sources:
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: monitoring.coreos.com/v1
              kind: PodMonitor
              metadata:
                name: gatekeeper
                namespace: gatekeeper-system
                annotations:
                  argocd.argoproj.io/sync-wave: "0"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                labels:
                  app: gatekeeper
                  release: prometheus
              spec:
                selector:
                  matchLabels:
                    app: gatekeeper
                    control-plane: controller-manager
                podMetricsEndpoints:
                  - port: metrics
                    path: /metrics
                    interval: 30s
            - apiVersion: monitoring.coreos.com/v1
              kind: PodMonitor
              metadata:
                name: gatekeeper-audit
                namespace: gatekeeper-system
                annotations:
                  argocd.argoproj.io/sync-wave: "0"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                labels:
                  app: gatekeeper
                  release: prometheus
              spec:
                selector:
                  matchLabels:
                    app: gatekeeper
                    control-plane: audit-controller
                podMetricsEndpoints:
                  - port: metrics
                    path: /metrics
                    interval: 30s
            - apiVersion: grafana.integreatly.org/v1beta1
              kind: GrafanaDashboard
              metadata:
                name: opa-gatekeeper
                namespace: monitoring
                annotations:
                  argocd.argoproj.io/sync-wave: "0"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                labels:
                  dashboards: "grafana"
              spec:
                instanceSelector:
                  matchLabels:
                    dashboards: "grafana"
                resyncPeriod: 30s
                json: |
                  {
                    "annotations": {
                      "list": [
                        {
                          "builtIn": 1,
                          "datasource": {
                            "type": "datasource",
                            "uid": "grafana"
                          },
                          "enable": true,
                          "hide": true,
                          "iconColor": "rgba(0, 211, 255, 1)",
                          "name": "Annotations & Alerts",
                          "type": "dashboard"
                        }
                      ]
                    },
                    "description": "OPA Gatekeeper monitoring dashboard showing policy violations, constraints, and audit metrics",
                    "editable": true,
                    "fiscalYearStartMonth": 0,
                    "graphTooltip": 0,
                    "id": null,
                    "links": [],
                    "liveNow": false,
                    "panels": [
                      {
                        "collapsed": false,
                        "gridPos": {
                          "h": 1,
                          "w": 24,
                          "x": 0,
                          "y": 0
                        },
                        "id": 100,
                        "panels": [],
                        "title": "Overview",
                        "type": "row"
                      },
                      {
                        "datasource": "Prometheus",
                        "description": "Total number of policy violations detected by enforcement action",
                        "fieldConfig": {
                          "defaults": {
                            "color": {
                              "mode": "thresholds"
                            },
                            "mappings": [],
                            "thresholds": {
                              "mode": "absolute",
                              "steps": [
                                {
                                  "color": "green",
                                  "value": null
                                },
                                {
                                  "color": "red",
                                  "value": 1
                                }
                              ]
                            }
                          },
                          "overrides": [
                            {
                              "matcher": {
                                "id": "byName",
                                "options": "warn"
                              },
                              "properties": [
                                {
                                  "id": "color",
                                  "value": {
                                    "fixedColor": "orange",
                                    "mode": "fixed"
                                  }
                                }
                              ]
                            },
                            {
                              "matcher": {
                                "id": "byName",
                                "options": "deny"
                              },
                              "properties": [
                                {
                                  "id": "color",
                                  "value": {
                                    "fixedColor": "red",
                                    "mode": "fixed"
                                  }
                                }
                              ]
                            },
                            {
                              "matcher": {
                                "id": "byName",
                                "options": "dryrun"
                              },
                              "properties": [
                                {
                                  "id": "color",
                                  "value": {
                                    "fixedColor": "yellow",
                                    "mode": "fixed"
                                  }
                                }
                              ]
                            }
                          ]
                        },
                        "gridPos": {
                          "h": 8,
                          "w": 12,
                          "x": 0,
                          "y": 1
                        },
                        "id": 1,
                        "options": {
                          "displayMode": "gradient",
                          "minVizHeight": 10,
                          "minVizWidth": 0,
                          "orientation": "horizontal",
                          "reduceOptions": {
                            "calcs": [
                              "lastNotNull"
                            ],
                            "fields": "",
                            "values": false
                          },
                          "showUnfilled": true
                        },
                        "pluginVersion": "9.4.7",
                        "targets": [
                          {
                            "datasource": "Prometheus",
                            "expr": "sum by (enforcement_action) (gatekeeper_violations)",
                            "legendFormat": "{{`{{enforcement_action}}`}}",
                            "refId": "A"
                          }
                        ],
                        "title": "Total Violations by Enforcement Action",
                        "type": "bargauge"
                      },
                      {
                        "datasource": "Prometheus",
                        "description": "Current number of constraints and constraint templates",
                        "fieldConfig": {
                          "defaults": {
                            "color": {
                              "mode": "thresholds"
                            },
                            "mappings": [],
                            "thresholds": {
                              "mode": "absolute",
                              "steps": [
                                {
                                  "color": "blue",
                                  "value": null
                                }
                              ]
                            }
                          },
                          "overrides": []
                        },
                        "gridPos": {
                          "h": 4,
                          "w": 6,
                          "x": 12,
                          "y": 1
                        },
                        "id": 2,
                        "options": {
                          "colorMode": "value",
                          "graphMode": "area",
                          "justifyMode": "auto",
                          "orientation": "auto",
                          "reduceOptions": {
                            "calcs": [
                              "lastNotNull"
                            ],
                            "fields": "",
                            "values": false
                          },
                          "textMode": "auto"
                        },
                        "pluginVersion": "9.4.7",
                        "targets": [
                          {
                            "datasource": "Prometheus",
                            "expr": "sum(gatekeeper_constraint_templates)",
                            "refId": "A"
                          }
                        ],
                        "title": "Constraint Templates",
                        "type": "stat"
                      },
                      {
                        "datasource": "Prometheus",
                        "fieldConfig": {
                          "defaults": {
