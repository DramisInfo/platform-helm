                            },
                            "unit": "s"
                          },
                          "overrides": []
                        },
                        "gridPos": {
                          "h": 4,
                          "w": 6,
                          "x": 12,
                          "y": 5
                        },
                        "id": 4,
                        "options": {
                          "colorMode": "value",
                          "graphMode": "area",
                          "justifyMode": "auto",
                          "orientation": "auto",
                          "reduceOptions": {
                            "calcs": [
                              "lastNotNull"
