                                  "color": "red",
                                  "value": 10
                                }
                              ]
                            },
                            "unit": "s"
                          },
                          "overrides": []
                        },
                        "gridPos": {
                          "h": 4,
                          "w": 6,
                          "x": 18,
                          "y": 5
                        },
                        "id": 5,
                        "options": {
                          "colorMode": "value",
                          "graphMode": "area",
                          "justifyMode": "auto",
                          "orientation": "auto",
                          "reduceOptions": {
                            "calcs": [
                              "lastNotNull"
                            ],
                            "fields": "",
