                            "datasource": "Prometheus",
                            "expr": "sum by (le) (rate(gatekeeper_validation_request_duration_seconds_bucket[5m]))",
                            "format": "heatmap",
                            "legendFormat": "{{`{{le}}`}}",
                            "refId": "A"
                          }
                        ],
                        "title": "Validation Request Duration Heatmap",
                        "type": "heatmap"
                      }
                    ],
                    "refresh": "30s",
                    "schemaVersion": 38,
                    "style": "dark",
                    "tags": [
                      "opa",
                      "gatekeeper",
                      "policy",
                      "security"
                    ],
                    "templating": {
                      "list": []
                    },
                    "time": {
                      "from": "now-6h",
                      "to": "now"
                    },
                    "timepicker": {},
                    "timezone": "browser",
                    "title": "OPA Gatekeeper",
                    "uid": "opa-gatekeeper",
                    "version": 1,
                    "weekStart": ""
                  }
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
