{{- if .Values.bootstrap.gatekeeper.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-120"
spec:
  destination:
    namespace: gatekeeper-system
    server: "https://kubernetes.default.svc"
  project: default
  ignoreDifferences:
  - group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    jqPathExpressions:
    - .spec.preserveUnknownFields
    - .spec.names.singular
  sources:
    - repoURL: "https://open-policy-agent.github.io/gatekeeper/charts"
      targetRevision: "3.17.1"
      chart: gatekeeper
      helm:
        valuesObject:
          replicas: 2
          auditInterval: 60
          constraintViolationsLimit: 20
          auditFromCache: false
          # Emit Kubernetes Events for every admission denial and audit violation.
          # When monitoring is enabled, Alloy picks these up and ships them to Loki,
          # enabling per-resource violation queries in Grafana dashboards.
          emitAdmissionEvents: {{ .Values.bootstrap.monitoring.enabled }}
          emitAuditEvents: {{ .Values.bootstrap.monitoring.enabled }}
          logLevel: INFO
          # Log each admission denial as structured JSON to the controller pod logs.
          # Alloy ships these to Loki when monitoring is enabled.
          logDenies: {{ .Values.bootstrap.monitoring.enabled }}
          image:
            release: v3.17.1
          podAnnotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "8888"
            prometheus.io/path: "/metrics"
          auditPodAnnotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "8888"
            prometheus.io/path: "/metrics"
    {{- if .Values.bootstrap.gatekeeper.policies.enabled }}
    - repoURL: "https://github.com/open-policy-agent/gatekeeper-library"
      targetRevision: "master"
      path: "library/pod-security-policy"
    {{- end }}
    {{- if .Values.bootstrap.gatekeeper.policies.enabled }}
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            {{- if .Values.bootstrap.gatekeeper.policies.enabled }}
            - apiVersion: constraints.gatekeeper.sh/v1beta1
              kind: K8sPSPPrivilegedContainer
              metadata:
                name: psp-privileged-container
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                enforcementAction: {{ .Values.bootstrap.gatekeeper.policies.enforcementAction | default "deny" }}
                match:
                  kinds:
                    - apiGroups: [""]
                      kinds: ["Pod"]
                  namespaces:
                    - "*"
                  excludedNamespaces:
                    {{- $gwExcludedNs := .Values.bootstrap.gatekeeper.policies.excludedNamespaces | default (list "kube-system" "gatekeeper-system" "cert-manager" "istio-system" "ingress-nginx" "argocd") }}
                    {{- if .Values.bootstrap.monitoring.enabled }}
                    {{- $gwExcludedNs = append $gwExcludedNs "beyla" }}
                    {{- end }}
                    {{- toYaml $gwExcludedNs | nindent 20 }}
                {{- if .Values.bootstrap.gatekeeper.policies.exemptImages }}
                parameters:
                  exemptImages:
                    {{- toYaml .Values.bootstrap.gatekeeper.policies.exemptImages | nindent 20 }}
                {{- end }}
            - apiVersion: constraints.gatekeeper.sh/v1beta1
              kind: K8sPSPAllowedUsers
              metadata:
                name: psp-pods-must-run-as-nonroot
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                enforcementAction: {{ .Values.bootstrap.gatekeeper.policies.enforcementAction | default "deny" }}
                match:
                  kinds:
                    - apiGroups: [""]
                      kinds: ["Pod"]
                  namespaces:
                    - "*"
                  excludedNamespaces:
                    {{- $gwExcludedNs2 := .Values.bootstrap.gatekeeper.policies.excludedNamespaces | default (list "kube-system" "gatekeeper-system" "cert-manager" "istio-system" "ingress-nginx" "argocd") }}
                    {{- if .Values.bootstrap.monitoring.enabled }}
                    {{- $gwExcludedNs2 = append $gwExcludedNs2 "beyla" }}
                    {{- end }}
                    {{- toYaml $gwExcludedNs2 | nindent 20 }}
                parameters:
                  runAsUser:
                    rule: MustRunAsNonRoot
                  {{- if .Values.bootstrap.gatekeeper.policies.exemptImages }}
                  exemptImages:
                    {{- toYaml .Values.bootstrap.gatekeeper.policies.exemptImages | nindent 20 }}
                  {{- end }}
            {{- end }}
    {{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipHooks=true
      - Timeout=600
      - Validate=false
      - Wait=true
      - PruneEmpty=true
    {{- include "platform-core.defaultRetry" . | nindent 4 }}
{{- end -}}
