{{- if and .Values.bootstrap.gatekeeper.enabled .Values.bootstrap.monitoring.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: gatekeeper
  namespace: gatekeeper-system
  annotations:
    argocd.argoproj.io/sync-wave: "-55"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app: gatekeeper
    release: prometheus
spec:
  selector:
    matchLabels:
      app: gatekeeper
      control-plane: controller-manager
  podMetricsEndpoints:
  - port: metrics
    path: /metrics
    interval: 30s
{{- end -}}
