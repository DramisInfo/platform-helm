{{- if and .Values.bootstrap.gatekeeper.enabled .Values.bootstrap.gatekeeper.policies.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-policies
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-95"
spec:
  destination:
    namespace: gatekeeper-system
    server: "https://kubernetes.default.svc"
  project: default
  source:
    repoURL: "https://github.com/open-policy-agent/gatekeeper-library"
    targetRevision: "master"
    path: "library/pod-security-policy"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
{{- end -}}
