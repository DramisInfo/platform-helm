{{- if .Values.bootstrap.monitoring.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-75"
spec:
  destination:
    namespace: monitoring
    server: "https://kubernetes.default.svc"
  project: default
  sources:
    - repoURL: "https://grafana.github.io/helm-charts"
      targetRevision: "v5.15.1"
      chart: grafana-operator
      helm:
        valuesObject:
          # Watch all namespaces for GrafanaDashboard CRDs
          watchNamespaces: ""

          # Enable dashboard watching
          dashboards:
            enabled: true

          # Enable folder management
          folders:
            enabled: true

          # Enable library panel management
          libraryPanels:
            enabled: true

          # Grafana instance selector
          # The operator will manage Grafana instances with matching labels
          grafana:
            instanceSelector:
              matchLabels:
                dashboards: "grafana"
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: grafana.integreatly.org/v1beta1
              kind: Grafana
              metadata:
                name: grafana
                namespace: monitoring
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                labels:
                  dashboards: "grafana"
              spec:
                external:
                  url: http://prometheus-grafana.monitoring.svc.cluster.local
                  adminUser:
                    name: grafana-admin-credentials
                    key: GF_SECURITY_ADMIN_USER
                  adminPassword:
                    name: grafana-admin-credentials
                    key: GF_SECURITY_ADMIN_PASSWORD
            - apiVersion: v1
              kind: Secret
              metadata:
                name: grafana-admin-credentials
                namespace: monitoring
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              type: Opaque
              stringData:
                GF_SECURITY_ADMIN_USER: admin
                GF_SECURITY_ADMIN_PASSWORD: admin
            {{- if .Values.bootstrap.istio.enabled }}
            - apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                name: grafana
                namespace: monitoring
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                  link.argocd.argoproj.io/external-link: "https://grafana.{{ .Values.global.clusterName }}.dramisinfo.com"
              spec:
                parentRefs:
                  - name: shared-gateway
                    namespace: istio-system
                    sectionName: https
                hostnames:
                  - "grafana.{{ .Values.global.clusterName }}.dramisinfo.com"
                rules:
                  - backendRefs:
                      - name: prometheus-grafana
                        port: 80
            {{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    {{- include "platform-core.defaultRetry" . | nindent 4 }}
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - .spec.rules[].backendRefs[].group
        - .spec.rules[].backendRefs[].kind
        - .spec.rules[].backendRefs[].weight
        - .spec.rules[].matches
        - .spec.parentRefs[].group
        - .spec.parentRefs[].kind
{{- end -}}
