{{- if .Values.bootstrap.istio.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-100"
spec:
  destination:
    namespace: istio-system
    server: "https://kubernetes.default.svc"
  project: platform-networking
  sources:
    - repoURL: "https://istio-release.storage.googleapis.com/charts"
      targetRevision: "1.29.2"
      chart: base
      helm:
        valuesObject:
          defaultRevision: default
    - repoURL: "https://istio-release.storage.googleapis.com/charts"
      targetRevision: "1.29.2"
      chart: istiod
      helm:
        valuesObject:
          profile: ambient
          global:
            istioNamespace: istio-system
    - repoURL: "https://istio-release.storage.googleapis.com/charts"
      targetRevision: "1.29.2"
      chart: cni
      helm:
        valuesObject:
          profile: ambient
          global:
            platform: {{ .Values.bootstrap.istio.platform | default "k3s" | quote }}
    - repoURL: "https://istio-release.storage.googleapis.com/charts"
      targetRevision: "1.29.2"
      chart: ztunnel
      helm:
        valuesObject: {}
    # Wave 3 — Wildcard TLS certificate.
    # ArgoCD tracks cert-manager Certificate health (Ready condition) and will not
    # advance to wave 5 until the certificate is issued and the TLS secret exists,
    # eliminating the race condition with the Gateway listener validation.
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: cert-manager.io/v1
              kind: Certificate
              metadata:
                name: shared-gateway-wildcard-tls
                namespace: istio-system
                annotations:
                  argocd.argoproj.io/sync-wave: "3"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                secretName: shared-gateway-wildcard-tls
                issuerRef:
                  name: letsencrypt-prd
                  kind: ClusterIssuer
                dnsNames:
                  - "*.{{ .Values.global.clusterName }}.dramisinfo.com"
    # Wave 5 — Shared ingress gateway.
    # Istio auto-provisions the backing Deployment and Service (named shared-gateway-istio).
    # The TLS secret is guaranteed to exist by the time this wave is applied.
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: gateway.networking.k8s.io/v1
              kind: Gateway
              metadata:
                name: shared-gateway
                namespace: istio-system
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                gatewayClassName: istio
                listeners:
                  - name: http
                    hostname: "*.{{ .Values.global.clusterName }}.dramisinfo.com"
                    port: 80
                    protocol: HTTP
                    allowedRoutes:
                      namespaces:
                        from: All
                  - name: https
                    hostname: "*.{{ .Values.global.clusterName }}.dramisinfo.com"
                    port: 443
                    protocol: HTTPS
                    tls:
                      mode: Terminate
                      certificateRefs:
                        - name: shared-gateway-wildcard-tls
                    allowedRoutes:
                      namespaces:
                        from: All
    # Wave 10 — HTTP routes.
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            # Redirect all HTTP traffic to HTTPS
            - apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                name: http-to-https-redirect
                namespace: istio-system
                annotations:
                  argocd.argoproj.io/sync-wave: "10"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                parentRefs:
                  - name: shared-gateway
                    namespace: istio-system
                    sectionName: http
                rules:
                  - filters:
                      - type: RequestRedirect
                        requestRedirect:
                          scheme: https
                          statusCode: 301
            # ArgoCD web UI — HTTPRoute in argocd namespace (same as backend service)
            - apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                name: argocd-server
                namespace: argocd
                annotations:
                  argocd.argoproj.io/sync-wave: "10"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                  link.argocd.argoproj.io/external-link: "https://argo.{{ .Values.global.clusterName }}.dramisinfo.com"
              spec:
                parentRefs:
                  - name: shared-gateway
                    namespace: istio-system
                    sectionName: https
                hostnames:
                  - "argo.{{ .Values.global.clusterName }}.dramisinfo.com"
                rules:
                  - backendRefs:
                      - name: argocd-server
                        port: 80
    {{- if .Values.bootstrap.argocd.smeeUrl }}
    # Wave 10 — smee.io → ArgoCD webhook relay.
    # Subscribes to the smee.io channel and forwards GitHub webhook payloads to
    # argocd-server /api/webhook, enabling event-driven refresh instead of polling.
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: smee-argocd-webhook-relay
                namespace: argocd
                annotations:
                  argocd.argoproj.io/sync-wave: "10"
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: smee-argocd-webhook-relay
                template:
                  metadata:
                    labels:
                      app: smee-argocd-webhook-relay
                  spec:
                    containers:
                      - name: smee-client
                        image: node:20-alpine
                        command:
                          - npx
                          - smee-client
                          - --url
                          - {{ .Values.bootstrap.argocd.smeeUrl | quote }}
                          - --target
                          - "http://argocd-server.argocd.svc.cluster.local/api/webhook"
                        resources:
                          requests:
                            cpu: 10m
                            memory: 64Mi
                          limits:
                            memory: 128Mi
    {{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    {{- include "platform-core.defaultRetry" . | nindent 4 }}
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istiod-default-validator
      jsonPointers:
        - /webhooks/0/failurePolicy
        - /webhooks/0/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jsonPointers:
        - /webhooks/0/failurePolicy
        - /webhooks/0/clientConfig/caBundle
    - group: apps
      kind: DaemonSet
      name: ztunnel
      jsonPointers:
        - /metadata/annotations/deprecated.daemonset.template.generation
      jqPathExpressions:
        - .spec.template.spec.containers[].env[].valueFrom.resourceFieldRef.divisor
    - group: apps
      kind: DaemonSet
      name: istio-cni-node
      jsonPointers:
        - /metadata/annotations/deprecated.daemonset.template.generation
    # Kubernetes Gateway API webhook defaults group/kind/weight/matches fields
    # after apply — ignore these to prevent perpetual OutOfSync.
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - .spec.rules[].backendRefs[].group
        - .spec.rules[].backendRefs[].kind
        - .spec.rules[].backendRefs[].weight
        - .spec.rules[].matches
        - .spec.parentRefs[].group
        - .spec.parentRefs[].kind
    - group: gateway.networking.k8s.io
      kind: Gateway
      # Kubernetes normalizes tls: null on HTTP listeners and defaults group/kind
      # on certificateRefs.
      # index 0 = HTTP listener (no tls field), index 1 = HTTPS listener.
      jsonPointers:
        - /spec/listeners/0/tls
        - /spec/listeners/1/tls
      jqPathExpressions:
        - .spec.listeners[].tls.certificateRefs[].group
        - .spec.listeners[].tls.certificateRefs[].kind
{{- end -}}
