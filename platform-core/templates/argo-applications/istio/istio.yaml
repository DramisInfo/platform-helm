{{- if .Values.bootstrap.istio.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-100"
spec:
  destination:
    namespace: istio-system
    server: "https://kubernetes.default.svc"
  project: default
  sources:
    # Kubernetes Gateway API CRDs (not bundled with K3s — required before gateway resources)
    - repoURL: "https://github.com/kubernetes-sigs/gateway-api"
      targetRevision: "v1.2.1"
      path: config/crd
    - repoURL: "https://istio-release.storage.googleapis.com/charts"
      targetRevision: "1.28.4"
      chart: base
      helm:
        valuesObject:
          defaultRevision: default
    - repoURL: "https://istio-release.storage.googleapis.com/charts"
      targetRevision: "1.28.4"
      chart: istiod
      helm:
        valuesObject:
          profile: ambient
          global:
            istioNamespace: istio-system
    - repoURL: "https://istio-release.storage.googleapis.com/charts"
      targetRevision: "1.28.4"
      chart: cni
      helm:
        valuesObject:
          profile: ambient
          global:
            platform: {{ .Values.bootstrap.istio.platform | default "k3s" | quote }}
    - repoURL: "https://istio-release.storage.googleapis.com/charts"
      targetRevision: "1.28.4"
      chart: ztunnel
      helm:
        valuesObject: {}
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            # Shared ingress gateway using Kubernetes Gateway API.
            # Istio auto-provisions the backing Deployment and Service (named shared-gateway-istio).
            # cert-manager auto-provisions the wildcard TLS secret via the annotation below.
            - apiVersion: gateway.networking.k8s.io/v1
              kind: Gateway
              metadata:
                name: shared-gateway
                namespace: istio-system
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                  # cert-manager watches this annotation and auto-creates a Certificate
                  # for each HTTPS listener hostname, then populates the referenced secret.
                  cert-manager.io/cluster-issuer: letsencrypt-prd
              spec:
                gatewayClassName: istio
                listeners:
                  - name: http
                    hostname: "*.{{ .Values.global.clusterName }}.dramisinfo.com"
                    port: 80
                    protocol: HTTP
                    allowedRoutes:
                      namespaces:
                        from: All
                  - name: https
                    hostname: "*.{{ .Values.global.clusterName }}.dramisinfo.com"
                    port: 443
                    protocol: HTTPS
                    tls:
                      mode: Terminate
                      certificateRefs:
                        - name: shared-gateway-wildcard-tls
                    allowedRoutes:
                      namespaces:
                        from: All
            # Redirect all HTTP traffic to HTTPS
            - apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                name: http-to-https-redirect
                namespace: istio-system
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                parentRefs:
                  - name: shared-gateway
                    namespace: istio-system
                    sectionName: http
                rules:
                  - filters:
                      - type: RequestRedirect
                        requestRedirect:
                          scheme: https
                          statusCode: 301
            # ArgoCD web UI — HTTPRoute in argocd namespace (same as backend service)
            - apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                name: argocd-server
                namespace: argocd
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                parentRefs:
                  - name: shared-gateway
                    namespace: istio-system
                    sectionName: https
                hostnames:
                  - "argo.{{ .Values.global.clusterName }}.dramisinfo.com"
                rules:
                  - backendRefs:
                      - name: argocd-server
                        port: 80
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istiod-default-validator
      jsonPointers:
        - /webhooks/0/failurePolicy
        - /webhooks/0/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jsonPointers:
        - /webhooks/0/failurePolicy
        - /webhooks/0/clientConfig/caBundle
    - group: apps
      kind: DaemonSet
      name: ztunnel
      jsonPointers:
        - /metadata/annotations/deprecated.daemonset.template.generation
      jqPathExpressions:
        - .spec.template.spec.containers[].env[].valueFrom.resourceFieldRef.divisor
    - group: apps
      kind: DaemonSet
      name: istio-cni-node
      jsonPointers:
        - /metadata/annotations/deprecated.daemonset.template.generation
{{- end -}}
