{{- if .Values.bootstrap.kong.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
spec:
  destination:
    namespace: kong
    server: "https://kubernetes.default.svc"
  project: default
  sources:
    - repoURL: "https://charts.konghq.com"
      targetRevision: "3.0.2"
      chart: kong
      helm:
        valuesObject:
          # Run Kong in DB-less mode (declarative config via Ingress / CRDs)
          env:
            database: "off"
            {{- if .Values.bootstrap.kong.manager.enabled }}
            # Tell Kong Manager's browser frontend where to reach the Admin API
            admin_gui_api_url: {{ if .Values.bootstrap.kong.admin.host }}{{ printf "https://%s" .Values.bootstrap.kong.admin.host | quote }}{{ else }}{{ printf "https://kong-admin.%s.dramisinfo.com" .Values.global.clusterName | quote }}{{ end }}
            {{- end }}
          # Security contexts to comply with Gatekeeper policies
          containerSecurityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          podSecurityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          # Proxy service — ClusterIP when fronted by Istio gateway
          proxy:
            enabled: true
            type: {{ .Values.bootstrap.kong.proxy.type | quote }}
          # Kong Ingress Controller
          ingressController:
            enabled: {{ .Values.bootstrap.kong.ingressController.enabled }}
            containerSecurityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
            {{- if .Values.bootstrap.kong.ingressController.watchNamespace }}
            watchNamespace: {{ .Values.bootstrap.kong.ingressController.watchNamespace | quote }}
            {{- end }}
          # Admin API — always ClusterIP; auto-enabled when manager is enabled
          admin:
            enabled: {{ or .Values.bootstrap.kong.admin.enabled .Values.bootstrap.kong.manager.enabled }}
            type: ClusterIP
            http:
              enabled: true
            tls:
              enabled: false
          {{- if .Values.bootstrap.kong.serviceMonitor.enabled }}
          # Prometheus ServiceMonitor integration
          serviceMonitor:
            enabled: true
          {{- end }}
          # Kong Manager (web UI) — ClusterIP so it is fronted by Istio
          manager:
            enabled: {{ .Values.bootstrap.kong.manager.enabled }}
            {{- if .Values.bootstrap.kong.manager.enabled }}
            type: ClusterIP
            http:
              enabled: true
            tls:
              enabled: false
            {{- end }}
    {{- if .Values.bootstrap.kong.virtualService.enabled }}
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: networking.istio.io/v1beta1
              kind: VirtualService
              metadata:
                name: kong-proxy
                namespace: kong
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                hosts:
                  - {{ if .Values.bootstrap.kong.virtualService.host }}{{ .Values.bootstrap.kong.virtualService.host | quote }}{{ else }}{{ printf "api.%s.dramisinfo.com" .Values.global.clusterName | quote }}{{ end }}
                gateways:
                  - istio-system/shared-gateway
                http:
                  - match:
                      - uri:
                          prefix: /
                    route:
                      - destination:
                          host: kong-kong-proxy
                          port:
                            number: 80
            {{- if .Values.bootstrap.kong.manager.enabled }}
            - apiVersion: networking.istio.io/v1beta1
              kind: VirtualService
              metadata:
                name: kong-admin
                namespace: kong
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                hosts:
                  - {{ if .Values.bootstrap.kong.admin.host }}{{ .Values.bootstrap.kong.admin.host | quote }}{{ else }}{{ printf "kong-admin.%s.dramisinfo.com" .Values.global.clusterName | quote }}{{ end }}
                gateways:
                  - istio-system/shared-gateway
                http:
                  - match:
                      - uri:
                          prefix: /
                    route:
                      - destination:
                          host: kong-kong-admin
                          port:
                            number: 8001
            {{- end }}
            {{- if .Values.bootstrap.kong.manager.enabled }}
            - apiVersion: networking.istio.io/v1beta1
              kind: VirtualService
              metadata:
                name: kong-manager
                namespace: kong
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                hosts:
                  - {{ if .Values.bootstrap.kong.manager.host }}{{ .Values.bootstrap.kong.manager.host | quote }}{{ else }}{{ printf "kong-manager.%s.dramisinfo.com" .Values.global.clusterName | quote }}{{ end }}
                gateways:
                  - istio-system/shared-gateway
                http:
                  - match:
                      - uri:
                          prefix: /
                    route:
                      - destination:
                          host: kong-kong-manager
                          port:
                            number: 8002
            {{- end }}
    {{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    {{- include "platform-core.defaultRetry" . | nindent 4 }}
{{- end -}}
