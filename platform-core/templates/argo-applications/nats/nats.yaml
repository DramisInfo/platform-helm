{{- if .Values.bootstrap.nats.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-40"    
spec:
  destination:
    namespace: nats
    server: "https://kubernetes.default.svc"
  project: default
  sources:
    - repoURL: "https://nats-io.github.io/k8s/helm/charts/"
      targetRevision: "1.3.9"
      chart: nats
      helm:
        valuesObject:
          nameOverride: {{ printf "%s" .Values.global.clusterName | quote }}
          config:
            cluster:
              enabled: true
              replicas: 3
              {{- if .Values.bootstrap.nats.gateway.enabled }}
              merge:
                name: {{ printf "%s-cluster" .Values.global.clusterName | quote }}
              {{- end }}
            {{- if .Values.bootstrap.nats.jetstream.enabled }}
            jetstream:
              enabled: true
              {{- if .Values.bootstrap.nats.jetstream.fileStore.enabled }}
              fileStore:
                enabled: true
                dir: /data
                {{- if .Values.bootstrap.nats.jetstream.fileStore.size }}
                pvc:
                  size: {{ .Values.bootstrap.nats.jetstream.fileStore.size | quote }}
                  {{- if .Values.bootstrap.nats.jetstream.fileStore.storageClassName }}
                  storageClassName: {{ .Values.bootstrap.nats.jetstream.fileStore.storageClassName | quote }}
                  {{- end }}
                {{- end }}
              {{- end }}
              {{- if .Values.bootstrap.nats.jetstream.memoryStore.enabled }}
              memoryStore:
                enabled: true
                {{- if .Values.bootstrap.nats.jetstream.memoryStore.maxSize }}
                maxSize: {{ .Values.bootstrap.nats.jetstream.memoryStore.maxSize | quote }}
                {{- end }}
              {{- end }}
            {{- end }}
            {{- if .Values.bootstrap.nats.gateway.enabled }}
            gateway:
              enabled: true
              {{- if .Values.bootstrap.nats.gateway.port }}
              port: {{ .Values.bootstrap.nats.gateway.port }}
              {{- end }}
              merge:
                {{- if .Values.bootstrap.nats.gateway.name }}
                name: {{ .Values.bootstrap.nats.gateway.name | quote }}
                {{- else }}
                name: {{ .Values.global.clusterName | quote }}
                {{- end }}
                {{- if .Values.bootstrap.nats.gateway.advertise }}
                advertise: {{ .Values.bootstrap.nats.gateway.advertise | quote }}
                {{- end }}
                {{- if .Values.bootstrap.nats.gateway.gateways }}
                gateways:
                  {{- range .Values.bootstrap.nats.gateway.gateways }}
                  - name: {{ .name | quote }}
                    url: {{ .url | quote }}
                  {{- end }}
                {{- end }}
            {{- end }}
          {{- if .Values.bootstrap.nats.gateway.enabled }}
          service:
            merge:
              spec:
                type: LoadBalancer
            ports:
              gateway:
                enabled: true
          {{- end }}
          # Security context to comply with Gatekeeper policies
          # Based on community recommendations: https://github.com/nats-io/k8s/issues/904
          podTemplate:
            merge:
              spec:
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 1000
                  runAsGroup: 2000
                  fsGroup: 3000
                  seccompProfile:
                    type: RuntimeDefault
                automountServiceAccountToken: false
          container:
            merge:
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop:
                    - ALL
                privileged: false
                # Note: readOnlyRootFilesystem NOT set to allow JetStream to function
          reloader:
            merge:
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop:
                    - ALL
                privileged: false
                readOnlyRootFilesystem: true
          {{- if .Values.bootstrap.monitoring.enabled }}
          promExporter:
            enabled: true
            podMonitor:
              enabled: true
              merge:
                metadata:
                  labels:
                    release: prometheus
          {{- end }}
          natsBox:
            enabled: true
            container:
              image:
                tag: 0.14.3-nonroot
              merge:
                securityContext:
                  allowPrivilegeEscalation: false
                  runAsNonRoot: true
                  runAsUser: 1000
                  capabilities:
                    drop:
                      - ALL
                  privileged: false
                  readOnlyRootFilesystem: true
              patch:
                - op: add
                  path: /volumeMounts/-
                  value:
                    name: nsc-config
                    mountPath: /nsc/.config
            podTemplate:
              merge:
                spec:
                  securityContext:
                    runAsNonRoot: true
                    runAsUser: 1000
                    runAsGroup: 2000
                    fsGroup: 3000
                    seccompProfile:
                      type: RuntimeDefault
                  automountServiceAccountToken: false
              patch:
                - op: add
                  path: /spec/volumes/-
                  value:
                    name: nsc-config
                    emptyDir:
                      sizeLimit: "100Mi"
          serviceAccount:
            enabled: true
    {{- if .Values.bootstrap.monitoring.enabled }}
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: grafana.integreatly.org/v1beta1
              kind: GrafanaDashboard
              metadata:
                name: nats-monitoring
                namespace: monitoring
                annotations:
                  argocd.argoproj.io/sync-wave: "-50"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                labels:
                  dashboards: "grafana"
              spec:
                instanceSelector:
                  matchLabels:
                    dashboards: "grafana"
                resyncPeriod: 30s
                json: |
                  {
                    "annotations": {
                      "list": [
                        {
                          "builtIn": 1,
                          "datasource": {
                            "type": "grafana",
                            "uid": "-- Grafana --"
                          },
                          "enable": true,
                          "hide": true,
                          "iconColor": "rgba(0, 211, 255, 1)",
                          "name": "Annotations & Alerts",
                          "type": "dashboard"
                        }
                      ]
                    },
                    "description": "NATS SRE Dashboard - Golden Signals, SLIs and SLOs for NATS cluster reliability monitoring",
                    "editable": true,
                    "fiscalYearStartMonth": 0,
                    "graphTooltip": 0,
                    "id": null,
                    "links": [],
                    "panels": [
                      {
                                            "id": 1,
                                            "type": "stat",
                                            "title": "Cluster Size",
                                            "description": "SLI: Number of healthy NATS pods",
                                            "gridPos": {
                                                                  "h": 4,
                                                                  "w": 4,
                                                                  "x": 0,
                                                                  "y": 0
                                            },
                                            "datasource": {
                                                                  "type": "prometheus",
                                                                  "uid": "$datasource"
                                            },
                                            "options": {
                                                                  "colorMode": "background",
                                                                  "graphMode": "none",
                                                                  "justifyMode": "center",
                                                                  "orientation": "auto",
                                                                  "reduceOptions": {
                                                                                        "calcs": [
                                                                                                              "lastNotNull"
                                                                                        ],
                                                                                        "fields": "",
                                                                                        "values": false
                                                                  },
                                                                  "textMode": "auto"
                                            },
                                            "fieldConfig": {
                                                                  "defaults": {
                                                                                        "color": {
                                                                                                              "mode": "thresholds"
                                                                                        },
                                                                                        "thresholds": {
                                                                                                              "mode": "absolute",
                                                                                                              "steps": [
                                                                                                                                    {
                                                                                                                                                          "color": "red",
                                                                                                                                                          "value": null
                                                                                                                                    },
                                                                                                                                    {
                                                                                                                                                          "color": "yellow",
                                                                                                                                                          "value": 2
                                                                                                                                    },
                                                                                                                                    {
                                                                                                                                                          "color": "green",
                                                                                                                                                          "value": 3
                                                                                                                                    }
                                                                                                              ]
                                                                                        },
                                                                                        "unit": "short",
                                                                                        "mappings": []
                                                                  },
                                                                  "overrides": []
                                            },
                                            "targets": [
                                                                  {
                                                                                        "datasource": {
                                                                                                              "type": "prometheus",
                                                                                                              "uid": "$datasource"
                                                                                        },
                                                                                        "expr": "count(nats_varz_connections{namespace=~\"$namespace\"})",
                                                                                        "refId": "A"
                                                                  }
                                            ]
                      },
                      {
                                            "id": 2,
                                            "type": "stat",
                                            "title": "Message Rate In",
                                            "description": "SLI: Aggregate inbound message throughput",
                                            "gridPos": {
                                                                  "h": 4,
                                                                  "w": 4,
                                                                  "x": 4,
                                                                  "y": 0
                                            },
                                            "datasource": {
                                                                  "type": "prometheus",
                                                                  "uid": "$datasource"
                                            },
                                            "options": {
                                                                  "colorMode": "value",
                                                                  "graphMode": "area",
                                                                  "justifyMode": "center",
                                                                  "orientation": "auto",
                                                                  "reduceOptions": {
                                                                                        "calcs": [
                                                                                                              "lastNotNull"
                                                                                        ],
                                                                                        "fields": "",
                                                                                        "values": false
                                                                  },
                                                                  "textMode": "auto"
                                            },
                                            "fieldConfig": {
                                                                  "defaults": {
                                                                                        "color": {
                                                                                                              "mode": "palette-classic"
                                                                                        },
                                                                                        "unit": "msg/s",
                                                                                        "mappings": [],
                                                                                        "thresholds": {
                                                                                                              "mode": "absolute",
                                                                                                              "steps": [
                                                                                                                                    {
                                                                                                                                                          "color": "green",
                                                                                                                                                          "value": null
                                                                                                                                    }
                                                                                                              ]
                                                                                        }
                                                                  },
                                                                  "overrides": []
                                            },
                                            "targets": [
                                                                  {
                                                                                        "datasource": {
                                                                                                              "type": "prometheus",
                                                                                                              "uid": "$datasource"
                                                                                        },
                                                                                        "expr": "sum(rate(nats_varz_in_msgs{namespace=~\"$namespace\"}[$__rate_interval]))",
                                                                                        "refId": "A"
                                                                  }
                                            ]
                      },
                      {
                                            "id": 3,
                                            "type": "stat",
                                            "title": "Message Rate Out",
                                            "description": "SLI: Aggregate outbound message throughput",
                                            "gridPos": {
                                                                  "h": 4,
                                                                  "w": 4,
                                                                  "x": 8,
                                                                  "y": 0
                                            },
                                            "datasource": {
                                                                  "type": "prometheus",
                                                                  "uid": "$datasource"
                                            },
                                            "options": {
                                                                  "colorMode": "value",
                                                                  "graphMode": "area",
                                                                  "justifyMode": "center",
                                                                  "orientation": "auto",
                                                                  "reduceOptions": {
                                                                                        "calcs": [
                                                                                                              "lastNotNull"
                                                                                        ],
                                                                                        "fields": "",
                                                                                        "values": false
                                                                  },
                                                                  "textMode": "auto"
                                            },
                                            "fieldConfig": {
                                                                  "defaults": {
                                                                                        "color": {
                                                                                                              "mode": "palette-classic"
                                                                                        },
                                                                                        "unit": "msg/s",
                                                                                        "mappings": [],
                                                                                        "thresholds": {
                                                                                                              "mode": "absolute",
                                                                                                              "steps": [
                                                                                                                                    {
                                                                                                                                                          "color": "green",
                                                                                                                                                          "value": null
                                                                                                                                    }
                                                                                                              ]
                                                                                        }
                                                                  },
                                                                  "overrides": []
                                            },
                                            "targets": [
                                                                  {
                                                                                        "datasource": {
                                                                                                              "type": "prometheus",
                                                                                                              "uid": "$datasource"
                                                                                        },
                                                                                        "expr": "sum(rate(nats_varz_out_msgs{namespace=~\"$namespace\"}[$__rate_interval]))",
                                                                                        "refId": "A"
                                                                  }
                                            ]
                      },
                      {
                                            "id": 4,
                                            "type": "stat",
                                            "title": "Slow Consumers",
                                            "description": "SLI (Error): Slow consumers indicate back-pressure and potential message loss. Target: 0",
                                            "gridPos": {
                                                                  "h": 4,
                                                                  "w": 4,
                                                                  "x": 12,
                                                                  "y": 0
                                            },
                                            "datasource": {
                                                                  "type": "prometheus",
                                                                  "uid": "$datasource"
                                            },
                                            "options": {
                                                                  "colorMode": "background",
                                                                  "graphMode": "area",
                                                                  "justifyMode": "center",
                                                                  "orientation": "auto",
                                                                  "reduceOptions": {
                                                                                        "calcs": [
                                                                                                              "lastNotNull"
                                                                                        ],
                                                                                        "fields": "",
                                                                                        "values": false
                                                                  },
                                                                  "textMode": "auto"
                                            },
                                            "fieldConfig": {
                                                                  "defaults": {
                                                                                        "color": {
                                                                                                              "mode": "thresholds"
                                                                                        },
                                                                                        "thresholds": {
                                                                                                              "mode": "absolute",
                                                                                                              "steps": [
                                                                                                                                    {
                                                                                                                                                          "color": "green",
                                                                                                                                                          "value": null
                                                                                                                                    },
                                                                                                                                    {
                                                                                                                                                          "color": "red",
                                                                                                                                                          "value": 1
                                                                                                                                    }
                                                                                                              ]
                                                                                        },
                                                                                        "unit": "short",
                                                                                        "mappings": []
                                                                  },
                                                                  "overrides": []
                                            },
                                            "targets": [
                                                                  {
                                                                                        "datasource": {
                                                                                                              "type": "prometheus",
                                                                                                              "uid": "$datasource"
                                                                                        },
                                                                                        "expr": "sum(nats_varz_slow_consumers{namespace=~\"$namespace\"})",
                                                                                        "refId": "A"
                                                                  }
                                            ]
                      },
                      {
                                            "id": 5,
                                            "type": "stat",
                                            "title": "JetStream Streams",
                                            "description": "Total number of JetStream streams in the cluster",
                                            "gridPos": {
                                                                  "h": 4,
                                                                  "w": 4,
                                                                  "x": 16,
                                                                  "y": 0
                                            },
                                            "datasource": {
                                                                  "type": "prometheus",
                                                                  "uid": "$datasource"
                                            },
                                            "options": {
                                                                  "colorMode": "value",
                                                                  "graphMode": "none",
                                                                  "justifyMode": "center",
                                                                  "orientation": "auto",
                                                                  "reduceOptions": {
                                                                                        "calcs": [
                                                                                                              "lastNotNull"
                                                                                        ],
                                                                                        "fields": "",
                                                                                        "values": false
                                                                  },
                                                                  "textMode": "auto"
                                            },
                                            "fieldConfig": {
                                                                  "defaults": {
                                                                                        "color": {
                                                                                                              "mode": "palette-classic"
                                                                                        },
                                                                                        "unit": "short",
                                                                                        "mappings": [],
                                                                                        "thresholds": {
                                                                                                              "mode": "absolute",
                                                                                                              "steps": [
                                                                                                                                    {
                                                                                                                                                          "color": "blue",
                                                                                                                                                          "value": null
                                                                                                                                    }
                                                                                                              ]
                                                                                        }
                                                                  },
                                                                  "overrides": []
                                            },
                                            "targets": [
                                                                  {
                                                                                        "datasource": {
                                                                                                              "type": "prometheus",
                                                                                                              "uid": "$datasource"
                                                                                        },
                                                                                        "expr": "sum(nats_server_total_streams{namespace=~\"$namespace\"})",
                                                                                        "refId": "A"
                                                                  }
                                            ]
                      },
                      {
                                            "id": 6,
                                            "type": "stat",
                                            "title": "JetStream Consumers",
                                            "description": "Total number of JetStream consumers in the cluster",
                                            "gridPos": {
                                                                  "h": 4,
                                                                  "w": 4,
                                                                  "x": 20,
                                                                  "y": 0
                                            },
                                            "datasource": {
                                                                  "type": "prometheus",
                                                                  "uid": "$datasource"
                                            },
                                            "options": {
                                                                  "colorMode": "value",
                                                                  "graphMode": "none",
                                                                  "justifyMode": "center",
                                                                  "orientation": "auto",
                                                                  "reduceOptions": {
                                                                                        "calcs": [
                                                                                                              "lastNotNull"
                                                                                        ],
                                                                                        "fields": "",
                                                                                        "values": false
                                                                  },
                                                                  "textMode": "auto"
                                            },
                                            "fieldConfig": {
                                                                  "defaults": {
                                                                                        "color": {
                                                                                                              "mode": "palette-classic"
                                                                                        },
                                                                                        "unit": "short",
                                                                                        "mappings": [],
                                                                                        "thresholds": {
                                                                                                              "mode": "absolute",
                                                                                                              "steps": [
                                                                                                                                    {
                                                                                                                                                          "color": "blue",
                                                                                                                                                          "value": null
                                                                                                                                    }
                                                                                                              ]
                                                                                        }
                                                                  },
                                                                  "overrides": []
                                            },
                                            "targets": [
                                                                  {
                                                                                        "datasource": {
                                                                                                              "type": "prometheus",
                                                                                                              "uid": "$datasource"
                                                                                        },
                                                                                        "expr": "sum(nats_server_total_consumers{namespace=~\"$namespace\"})",
                                                                                        "refId": "A"
