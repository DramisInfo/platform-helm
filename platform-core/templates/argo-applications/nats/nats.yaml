                                                                                        "legendFormat": "{{"{{pod}}"}} out",
                                                                                        "refId": "B"
                                                                  }
                                            ]
                      },
                      {
                                            "id": 10,
                                            "type": "row",
                                            "title": "Errors (Golden Signal)",
                                            "collapsed": false,
                                            "gridPos": {
                                                                  "h": 1,
                                                                  "w": 24,
                                                                  "x": 0,
                                                                  "y": 13
                                            },
                                            "panels": []
                      },
                      {
                                            "id": 11,
                                            "type": "timeseries",
                                            "title": "Slow Consumers over Time",
                                            "description": "Golden Signal - Errors: slow consumers indicate a pod cannot keep up with message delivery, risking message loss. SLO: must be 0.",
                                            "gridPos": {
                                                                  "h": 8,
                                                                  "w": 12,
                                                                  "x": 0,
                                                                  "y": 14
                                            },
                                            "datasource": {
                                                                  "type": "prometheus",
                                                                  "uid": "$datasource"
                                            },
                                            "options": {
                                                                  "legend": {
                                                                                        "calcs": [
                                                                                                              "max"
                                                                                        ],
                                                                                        "displayMode": "table",
                                                                                        "placement": "bottom",
                                                                                        "showLegend": true
                                                                  },
                                                                  "tooltip": {
                                                                                        "mode": "multi",
                                                                                        "sort": "desc"
                                                                  }
                                            },
                                            "fieldConfig": {
                                                                  "defaults": {
                                                                                        "color": {
                                                                                                              "mode": "thresholds"
                                                                                        },
                                                                                        "custom": {
                                                                                                              "lineWidth": 2,
                                                                                                              "fillOpacity": 20
                                                                                        },
                                                                                        "unit": "short",
                                                                                        "mappings": [],
                                                                                        "thresholds": {
                                                                                                              "mode": "absolute",
                                                                                                              "steps": [
                                                                                                                                    {
                                                                                                                                                          "color": "green",
                                                                                                                                                          "value": null
                                                                                                                                    },
