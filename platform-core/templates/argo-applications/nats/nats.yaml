                    "fiscalYearStartMonth": 0,
                    "graphTooltip": 0,
                    "id": null,
                    "links": [],
                    "panels": [
                      {
                        "datasource": {
                          "type": "prometheus",
                          "uid": "$datasource"
                        },
                        "fieldConfig": {
                          "defaults": {
                            "color": {
                              "mode": "thresholds"
                            },
                            "mappings": [],
                            "thresholds": {
                              "mode": "absolute",
                              "steps": [
                                {
                                  "color": "green",
                                  "value": null
                                }
                              ]
                            },
                            "unit": "none"
                          },
                          "overrides": []
                        },
                        "gridPos": {
                          "h": 4,
                          "w": 5,
                          "x": 8,
                          "y": 0
                        },
                        "id": 1,
                        "options": {
                          "colorMode": "value",
                          "graphMode": "area",
                          "justifyMode": "auto",
                          "orientation": "auto",
                          "reduceOptions": {
                            "calcs": [
                              "lastNotNull"
                            ],
                            "fields": "",
                            "values": false
                          },
                          "textMode": "auto",
                          "wideLayout": true
                        },
                        "pluginVersion": "11.5.1",
                        "targets": [
                          {
                            "datasource": {
                              "type": "prometheus",
                              "uid": "$datasource"
                            },
                            "expr": "count(nats_varz_connections{namespace=~\"$namespace\"})",
                            "refId": "A"
                          }
