{{- if .Values.bootstrap.nats.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-40"    
spec:
  destination:
    namespace: nats
    server: "https://kubernetes.default.svc"
  project: default
  source:
    repoURL: "https://nats-io.github.io/k8s/helm/charts/"
    targetRevision: "1.3.9"
    chart: nats
    helm:
      valuesObject:
        nameOverride: {{ printf "%s" .Values.global.clusterName | quote }}
        config:
          cluster:
            enabled: true
            replicas: 3
            {{- if .Values.bootstrap.nats.gateway.enabled }}
            merge:
              name: {{ printf "%s-cluster" .Values.global.clusterName | quote }}
            {{- end }}
          {{- if .Values.bootstrap.nats.jetstream.enabled }}
          jetstream:
            enabled: true
            {{- if .Values.bootstrap.nats.jetstream.fileStore.enabled }}
            fileStore:
              enabled: true
              dir: /data
              {{- if .Values.bootstrap.nats.jetstream.fileStore.size }}
              pvc:
                size: {{ .Values.bootstrap.nats.jetstream.fileStore.size | quote }}
                {{- if .Values.bootstrap.nats.jetstream.fileStore.storageClassName }}
                storageClassName: {{ .Values.bootstrap.nats.jetstream.fileStore.storageClassName | quote }}
                {{- end }}
              {{- end }}
            {{- end }}
            {{- if .Values.bootstrap.nats.jetstream.memoryStore.enabled }}
            memoryStore:
              enabled: true
              {{- if .Values.bootstrap.nats.jetstream.memoryStore.maxSize }}
              maxSize: {{ .Values.bootstrap.nats.jetstream.memoryStore.maxSize | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- if .Values.bootstrap.nats.gateway.enabled }}
          gateway:
            enabled: true
            {{- if .Values.bootstrap.nats.gateway.port }}
            port: {{ .Values.bootstrap.nats.gateway.port }}
            {{- end }}
            merge:
              {{- if .Values.bootstrap.nats.gateway.name }}
              name: {{ .Values.bootstrap.nats.gateway.name | quote }}
              {{- else }}
              name: {{ .Values.global.clusterName | quote }}
              {{- end }}
              {{- if .Values.bootstrap.nats.gateway.advertise }}
              advertise: {{ .Values.bootstrap.nats.gateway.advertise | quote }}
              {{- end }}
              {{- if .Values.bootstrap.nats.gateway.gateways }}
              gateways:
                {{- range .Values.bootstrap.nats.gateway.gateways }}
                - name: {{ .name | quote }}
                  url: {{ .url | quote }}
                {{- end }}
              {{- end }}
          {{- end }}
        {{- if .Values.bootstrap.nats.gateway.enabled }}
        service:
          merge:
            spec:
              type: LoadBalancer
          ports:
            gateway:
              enabled: true
        {{- end }}
        # Security context to comply with Gatekeeper policies
        # Based on community recommendations: https://github.com/nats-io/k8s/issues/904
        podTemplate:
          merge:
            spec:
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 2000
                fsGroup: 3000
                seccompProfile:
                  type: RuntimeDefault
              automountServiceAccountToken: false
        container:
          merge:
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              runAsUser: 1000
              capabilities:
                drop:
                  - ALL
              privileged: false
              # Note: readOnlyRootFilesystem NOT set to allow JetStream to function
        reloader:
          merge:
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              runAsUser: 1000
              capabilities:
                drop:
                  - ALL
              privileged: false
              readOnlyRootFilesystem: true
        {{- if .Values.bootstrap.monitoring.enabled }}
        promExporter:
          enabled: true
          podMonitor:
            enabled: true
            labels:
              release: prometheus
        {{- end }}
        natsBox:
          enabled: true
          container:
            image:
              tag: 0.14.3-nonroot
            merge:
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop:
                    - ALL
                privileged: false
                readOnlyRootFilesystem: true
            patch:
              - op: add
                path: /volumeMounts/-
                value:
                  name: nsc-config
                  mountPath: /nsc/.config
          podTemplate:
            merge:
              spec:
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 1000
                  runAsGroup: 2000
                  fsGroup: 3000
                  seccompProfile:
                    type: RuntimeDefault
                automountServiceAccountToken: false
            patch:
              - op: add
                path: /spec/volumes/-
                value:
                  name: nsc-config
                  emptyDir:
                    sizeLimit: "100Mi"
        serviceAccount:
          enabled: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipHooks=true
      - Timeout=600
      - Validate=false
      - Wait=true
      - PruneEmpty=true
{{- end -}}
