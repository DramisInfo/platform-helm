{{- if .Values.bootstrap.nats.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-40"    
spec:
  destination:
    namespace: nats
    server: "https://kubernetes.default.svc"
  project: default
  sources:
    - repoURL: "https://nats-io.github.io/k8s/helm/charts/"
      targetRevision: "1.3.9"
      chart: nats
      helm:
        valuesObject:
          nameOverride: {{ printf "%s" .Values.global.clusterName | quote }}
          config:
            cluster:
              enabled: true
              replicas: 3
              {{- if .Values.bootstrap.nats.gateway.enabled }}
              merge:
                name: {{ printf "%s-cluster" .Values.global.clusterName | quote }}
              {{- end }}
            {{- if .Values.bootstrap.nats.jetstream.enabled }}
            jetstream:
              enabled: true
              {{- if .Values.bootstrap.nats.jetstream.fileStore.enabled }}
              fileStore:
                enabled: true
                dir: /data
                {{- if .Values.bootstrap.nats.jetstream.fileStore.size }}
                pvc:
                  size: {{ .Values.bootstrap.nats.jetstream.fileStore.size | quote }}
                  {{- if .Values.bootstrap.nats.jetstream.fileStore.storageClassName }}
                  storageClassName: {{ .Values.bootstrap.nats.jetstream.fileStore.storageClassName | quote }}
                  {{- end }}
                {{- end }}
              {{- end }}
              {{- if .Values.bootstrap.nats.jetstream.memoryStore.enabled }}
              memoryStore:
                enabled: true
                {{- if .Values.bootstrap.nats.jetstream.memoryStore.maxSize }}
                maxSize: {{ .Values.bootstrap.nats.jetstream.memoryStore.maxSize | quote }}
                {{- end }}
              {{- end }}
            {{- end }}
            {{- if .Values.bootstrap.nats.gateway.enabled }}
            gateway:
              enabled: true
              {{- if .Values.bootstrap.nats.gateway.port }}
              port: {{ .Values.bootstrap.nats.gateway.port }}
              {{- end }}
              merge:
                {{- if .Values.bootstrap.nats.gateway.name }}
                name: {{ .Values.bootstrap.nats.gateway.name | quote }}
                {{- else }}
                name: {{ .Values.global.clusterName | quote }}
                {{- end }}
                {{- if .Values.bootstrap.nats.gateway.advertise }}
                advertise: {{ .Values.bootstrap.nats.gateway.advertise | quote }}
                {{- end }}
                {{- if .Values.bootstrap.nats.gateway.gateways }}
                gateways:
                  {{- range .Values.bootstrap.nats.gateway.gateways }}
                  - name: {{ .name | quote }}
                    url: {{ .url | quote }}
                  {{- end }}
                {{- end }}
            {{- end }}
          {{- if .Values.bootstrap.nats.gateway.enabled }}
          service:
            merge:
              spec:
                type: LoadBalancer
            ports:
              gateway:
                enabled: true
          {{- end }}
          # Security context to comply with Gatekeeper policies
          # Based on community recommendations: https://github.com/nats-io/k8s/issues/904
          podTemplate:
            merge:
              spec:
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 1000
                  runAsGroup: 2000
                  fsGroup: 3000
                  seccompProfile:
                    type: RuntimeDefault
                automountServiceAccountToken: false
          container:
            merge:
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop:
                    - ALL
                privileged: false
                # Note: readOnlyRootFilesystem NOT set to allow JetStream to function
          reloader:
            merge:
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop:
                    - ALL
                privileged: false
                readOnlyRootFilesystem: true
          {{- if .Values.bootstrap.monitoring.enabled }}
          promExporter:
            enabled: true
            podMonitor:
              enabled: true
              merge:
                metadata:
                  labels:
                    release: prometheus
          {{- end }}
          natsBox:
            enabled: true
            container:
              image:
                tag: 0.14.3-nonroot
              merge:
                securityContext:
                  allowPrivilegeEscalation: false
                  runAsNonRoot: true
                  runAsUser: 1000
                  capabilities:
                    drop:
                      - ALL
                  privileged: false
                  readOnlyRootFilesystem: true
              patch:
                - op: add
                  path: /volumeMounts/-
                  value:
                    name: nsc-config
                    mountPath: /nsc/.config
            podTemplate:
              merge:
                spec:
                  securityContext:
                    runAsNonRoot: true
                    runAsUser: 1000
                    runAsGroup: 2000
                    fsGroup: 3000
                    seccompProfile:
                      type: RuntimeDefault
                  automountServiceAccountToken: false
              patch:
                - op: add
                  path: /spec/volumes/-
                  value:
                    name: nsc-config
                    emptyDir:
                      sizeLimit: "100Mi"
          serviceAccount:
            enabled: true
    {{- if .Values.bootstrap.monitoring.enabled }}
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: grafana.integreatly.org/v1beta1
              kind: GrafanaDashboard
              metadata:
                name: nats-monitoring
                namespace: monitoring
                annotations:
                  argocd.argoproj.io/sync-wave: "-50"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                labels:
                  dashboards: "grafana"
              spec:
                instanceSelector:
                  matchLabels:
                    dashboards: "grafana"
                resyncPeriod: 30s
                json: |
                  {
                    "annotations": {
                      "list": [
                        {
                          "builtIn": 1,
                          "datasource": {
                            "type": "grafana",
                            "uid": "-- Grafana --"
                          },
                          "enable": true,
                          "hide": true,
                          "iconColor": "rgba(0, 211, 255, 1)",
                          "name": "Annotations & Alerts",
                          "type": "dashboard"
                        }
                      ]
                    },
                    "description": "NATS SRE Dashboard - Golden Signals, SLIs and SLOs for NATS cluster reliability monitoring",
                    "editable": true,
                    "fiscalYearStartMonth": 0,
                    "graphTooltip": 0,
                    "id": null,
                    "links": [],
                    "panels": [
                      {
                        "collapsed": false,
                        "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
                        "id": 1,
                        "title": "Golden Signals Overview",
                        "type": "row"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {
                            "color": {"mode": "thresholds"},
                            "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
                          },
                          "overrides": []
                        },
                        "gridPos": {"h": 4, "w": 4, "x": 0, "y": 1},
                        "id": 2,
                        "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "sum(nats_varz_connections{namespace=~\"$namespace\", pod=~\"$pod\"})", "legendFormat": "Connections", "refId": "A"}],
                        "title": "Active Connections",
                        "type": "stat"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {
                            "color": {"mode": "thresholds"},
                            "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
                            "unit": "short"
                          },
                          "overrides": []
                        },
                        "gridPos": {"h": 4, "w": 4, "x": 4, "y": 1},
                        "id": 3,
                        "options": {"colorMode": "background", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "sum(rate(nats_varz_in_msgs{namespace=~\"$namespace\", pod=~\"$pod\"}[5m])) + sum(rate(nats_varz_out_msgs{namespace=~\"$namespace\", pod=~\"$pod\"}[5m]))", "legendFormat": "msg/s", "refId": "A"}],
                        "title": "Total Throughput (msg/s)",
                        "type": "stat"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {
                            "color": {"mode": "thresholds"},
                            "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
                          },
                          "overrides": []
                        },
                        "gridPos": {"h": 4, "w": 4, "x": 8, "y": 1},
                        "id": 4,
                        "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "sum(nats_server_total_streams{namespace=~\"$namespace\", pod=~\"$pod\"})", "legendFormat": "Streams", "refId": "A"}],
                        "title": "JetStream Streams",
                        "type": "stat"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {
                            "color": {"mode": "thresholds"},
                            "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
                          },
                          "overrides": []
                        },
                        "gridPos": {"h": 4, "w": 4, "x": 12, "y": 1},
                        "id": 5,
                        "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "sum(nats_server_total_consumers{namespace=~\"$namespace\", pod=~\"$pod\"})", "legendFormat": "Consumers", "refId": "A"}],
                        "title": "JetStream Consumers",
                        "type": "stat"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {
                            "color": {"mode": "thresholds"},
                            "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}
                          },
                          "overrides": []
                        },
                        "gridPos": {"h": 4, "w": 4, "x": 16, "y": 1},
                        "id": 6,
                        "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "sum(nats_varz_slow_consumers{namespace=~\"$namespace\", pod=~\"$pod\"})", "legendFormat": "Slow Consumers", "refId": "A"}],
                        "title": "Slow Consumers",
                        "type": "stat"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {
                            "color": {"mode": "thresholds"},
                            "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}
                          },
                          "overrides": []
                        },
                        "gridPos": {"h": 4, "w": 4, "x": 20, "y": 1},
                        "id": 7,
                        "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "sum(increase(nats_varz_jetstream_stats_api_errors{namespace=~\"$namespace\", pod=~\"$pod\"}[5m]))", "legendFormat": "API Errors", "refId": "A"}],
                        "title": "JetStream API Errors (5m)",
                        "type": "stat"
                      },
                      {
                        "collapsed": false,
                        "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5},
                        "id": 10,
                        "title": "Traffic",
                        "type": "row"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "short"},
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
                        "id": 11,
                        "options": {"tooltip": {"mode": "multi"}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "rate(nats_varz_in_msgs{namespace=~\"$namespace\", pod=~\"$pod\"}[5m])", "legendFormat": "{{`{{pod}}`}}", "refId": "A"}],
                        "title": "Messages In Rate (msg/s)",
                        "type": "timeseries"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "short"},
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6},
                        "id": 12,
                        "options": {"tooltip": {"mode": "multi"}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "rate(nats_varz_out_msgs{namespace=~\"$namespace\", pod=~\"$pod\"}[5m])", "legendFormat": "{{`{{pod}}`}}", "refId": "A"}],
                        "title": "Messages Out Rate (msg/s)",
                        "type": "timeseries"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "Bps"},
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 12, "x": 0, "y": 14},
                        "id": 13,
                        "options": {"tooltip": {"mode": "multi"}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "rate(nats_varz_in_bytes{namespace=~\"$namespace\", pod=~\"$pod\"}[5m])", "legendFormat": "{{`{{pod}}`}}", "refId": "A"}],
                        "title": "Bytes In Rate",
                        "type": "timeseries"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "Bps"},
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 12, "x": 12, "y": 14},
                        "id": 14,
                        "options": {"tooltip": {"mode": "multi"}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "rate(nats_varz_out_bytes{namespace=~\"$namespace\", pod=~\"$pod\"}[5m])", "legendFormat": "{{`{{pod}}`}}", "refId": "A"}],
                        "title": "Bytes Out Rate",
                        "type": "timeseries"
                      },
                      {
                        "collapsed": false,
                        "gridPos": {"h": 1, "w": 24, "x": 0, "y": 22},
                        "id": 20,
                        "title": "Errors",
                        "type": "row"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "short"},
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 12, "x": 0, "y": 23},
                        "id": 21,
                        "options": {"tooltip": {"mode": "multi"}},
                        "targets": [
                          {"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "sum(nats_varz_slow_consumer_stats_clients{namespace=~\"$namespace\", pod=~\"$pod\"})", "legendFormat": "Clients", "refId": "A"},
                          {"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "sum(nats_varz_slow_consumer_stats_routes{namespace=~\"$namespace\", pod=~\"$pod\"})", "legendFormat": "Routes", "refId": "B"},
                          {"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "sum(nats_varz_slow_consumer_stats_gateways{namespace=~\"$namespace\", pod=~\"$pod\"})", "legendFormat": "Gateways", "refId": "C"},
                          {"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "sum(nats_varz_slow_consumer_stats_leafs{namespace=~\"$namespace\", pod=~\"$pod\"})", "legendFormat": "Leafs", "refId": "D"}
                        ],
                        "title": "Slow Consumers by Type",
                        "type": "timeseries"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "short"},
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 12, "x": 12, "y": 23},
                        "id": 22,
                        "options": {"tooltip": {"mode": "multi"}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "sum(rate(nats_varz_jetstream_stats_api_errors{namespace=~\"$namespace\", pod=~\"$pod\"}[5m]))", "legendFormat": "API Error Rate", "refId": "A"}],
                        "title": "JetStream API Error Rate",
                        "type": "timeseries"
                      },
                      {
                        "collapsed": false,
                        "gridPos": {"h": 1, "w": 24, "x": 0, "y": 31},
                        "id": 30,
                        "title": "Latency",
                        "type": "row"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "ns"},
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 12, "x": 0, "y": 32},
                        "id": 31,
                        "options": {"tooltip": {"mode": "multi"}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "nats_gatewayz_outbound_gateway_conn_rtt{namespace=~\"$namespace\", pod=~\"$pod\"}", "legendFormat": "{{`{{pod}}`}} → {{`{{remote_name}}`}}", "refId": "A"}],
                        "title": "Outbound Gateway RTT",
                        "type": "timeseries"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "ns"},
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 12, "x": 12, "y": 32},
                        "id": 32,
                        "options": {"tooltip": {"mode": "multi"}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "nats_gatewayz_inbound_gateway_conn_rtt{namespace=~\"$namespace\", pod=~\"$pod\"}", "legendFormat": "{{`{{pod}}`}} ← {{`{{remote_name}}`}}", "refId": "A"}],
                        "title": "Inbound Gateway RTT",
                        "type": "timeseries"
                      },
                      {
                        "collapsed": false,
                        "gridPos": {"h": 1, "w": 24, "x": 0, "y": 40},
                        "id": 40,
                        "title": "Saturation",
                        "type": "row"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {
                            "color": {"mode": "thresholds"},
                            "max": 100,
                            "min": 0,
                            "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]},
                            "unit": "percent"
                          },
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 8, "x": 0, "y": 41},
                        "id": 41,
                        "options": {"orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"]}, "showThresholdLabels": false, "showThresholdMarkers": true},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "100 * sum(nats_varz_connections{namespace=~\"$namespace\", pod=~\"$pod\"}) / sum(nats_varz_max_connections{namespace=~\"$namespace\", pod=~\"$pod\"})", "legendFormat": "Connection Utilization", "refId": "A"}],
                        "title": "Connection Utilization %",
                        "type": "gauge"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "bytes"},
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 8, "x": 8, "y": 41},
                        "id": 42,
                        "options": {"tooltip": {"mode": "multi"}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "nats_varz_mem{namespace=~\"$namespace\", pod=~\"$pod\"}", "legendFormat": "{{`{{pod}}`}}", "refId": "A"}],
                        "title": "Memory Usage per Pod",
                        "type": "timeseries"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "bytes"},
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 8, "x": 16, "y": 41},
                        "id": 43,
                        "options": {"tooltip": {"mode": "multi"}},
                        "targets": [
                          {"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "nats_varz_jetstream_stats_storage{namespace=~\"$namespace\", pod=~\"$pod\"}", "legendFormat": "Used {{`{{pod}}`}}", "refId": "A"},
                          {"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "nats_varz_jetstream_config_max_storage{namespace=~\"$namespace\", pod=~\"$pod\"}", "legendFormat": "Max {{`{{pod}}`}}", "refId": "B"}
                        ],
                        "title": "JetStream Storage Used vs Max",
                        "type": "timeseries"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "bytes"},
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 12, "x": 0, "y": 49},
                        "id": 44,
                        "options": {"tooltip": {"mode": "multi"}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "sum(nats_connz_pending_bytes{namespace=~\"$namespace\", pod=~\"$pod\"})", "legendFormat": "Pending Bytes", "refId": "A"}],
                        "title": "Pending Bytes (Backpressure)",
                        "type": "timeseries"
                      },
                      {
                        "datasource": {"type": "prometheus", "uid": "$datasource"},
                        "fieldConfig": {
                          "defaults": {"color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2}, "unit": "short"},
                          "overrides": []
                        },
                        "gridPos": {"h": 8, "w": 12, "x": 12, "y": 49},
                        "id": 45,
                        "options": {"tooltip": {"mode": "multi"}},
                        "targets": [{"datasource": {"type": "prometheus", "uid": "$datasource"}, "expr": "nats_varz_subscriptions{namespace=~\"$namespace\", pod=~\"$pod\"}", "legendFormat": "{{`{{pod}}`}}", "refId": "A"}],
                        "title": "Active Subscriptions per Pod",
                        "type": "timeseries"
                      }
                    ],
                    "refresh": "10s",
                    "schemaVersion": 39,
                    "tags": [
                      "nats",
                      "messaging",
                      "jetstream"
                    ],
                    "templating": {
                      "list": [
                        {
                          "current": {
                            "selected": false,
                            "text": "Prometheus",
                            "value": "prometheus"
                          },
                          "hide": 0,
                          "includeAll": false,
                          "label": "Datasource",
                          "multi": false,
                          "name": "datasource",
                          "options": [],
                          "query": "prometheus",
                          "refresh": 1,
                          "regex": "",
                          "skipUrlSync": false,
                          "type": "datasource"
                        },
                        {
                          "current": {
                            "selected": false,
                            "text": "nats",
                            "value": "nats"
                          },
                          "datasource": {
                            "type": "prometheus",
                            "uid": "$datasource"
                          },
                          "definition": "label_values(nats_varz_version, namespace)",
                          "hide": 0,
                          "includeAll": false,
                          "label": "Namespace",
                          "multi": false,
                          "name": "namespace",
                          "options": [],
                          "query": {
                            "qryType": 1,
