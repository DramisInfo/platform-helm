{{- if and .Values.bootstrap.gatekeeper.enabled .Values.bootstrap.prometheus.enabled .Values.bootstrap.grafana.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa-scorecard-exporter
  namespace: opa-scorecard
  labels:
    app: opa-scorecard-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa-scorecard-exporter
  template:
    metadata:
      labels:
        app: opa-scorecard-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9141"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: opa-scorecard-exporter
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: mcelep/opa_scorecard_exporter:v0.0.4
          args:
            - "-incluster"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: metrics
              containerPort: 9141
              protocol: TCP
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end -}}
