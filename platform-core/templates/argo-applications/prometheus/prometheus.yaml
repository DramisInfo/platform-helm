{{- if .Values.bootstrap.prometheus.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: monitoring
    server: "https://kubernetes.default.svc"
  project: default
  source:
    repoURL: "https://prometheus-community.github.io/helm-charts"
    targetRevision: "27.46.0"
    chart: prometheus
    helm:
      valuesObject:
        server:
          ingress:
            enabled: false
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prd"
              kubernetes.io/ingress.class: "nginx"
              nginx.ingress.kubernetes.io/ssl-redirect: "false"
            hosts:
              - prom.{{ .Values.global.clusterName }}.dramisinfo.com
            tls:
              - secretName: prometheus-tls
                hosts:
                  - prom.{{ .Values.global.clusterName }}.dramisinfo.com
        # Additional scrape configs to discover pods and services with prometheus.io annotations
        extraScrapeConfigs: |
          - job_name: 'kubernetes-pods'
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              # Only scrape pods with annotation: prometheus.io/scrape: "true"
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: true
              # Get the port from annotation: prometheus.io/port
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
                action: replace
                regex: ([^;]+);(.+)
                replacement: $2:$1
                target_label: __address__
              # Get the metrics path from annotation: prometheus.io/path
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              # Keep pod labels
              - action: labelmap
                regex: __meta_kubernetes_pod_label_(.+)
              # Add namespace label
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: kubernetes_namespace
              # Add pod name label  
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: kubernetes_pod_name
          - job_name: 'kubernetes-services'
            kubernetes_sd_configs:
              - role: service
            relabel_configs:
              # Only scrape services with annotation: prometheus.io/scrape: "true"
              - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                action: keep
                regex: true
              # Get the port from annotation: prometheus.io/port
              - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_port]
                action: replace
                target_label: __meta_kubernetes_service_port_number
                regex: (.+)
              # Get the metrics path from annotation: prometheus.io/path
              - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              # Keep service labels
              - action: labelmap
                regex: __meta_kubernetes_service_label_(.+)
              # Add namespace label
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: kubernetes_namespace
              # Add service name label
              - source_labels: [__meta_kubernetes_service_name]
                action: replace
                target_label: kubernetes_service_name

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipHooks=true
      - Timeout=600
      - Validate=false
      - Wait=true
      - PruneEmpty=true
{{- end -}}