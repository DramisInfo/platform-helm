{{- if .Values.bootstrap.monitoring.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-90"
spec:
  destination:
    namespace: monitoring
    server: "https://kubernetes.default.svc"
  project: platform-observability
  sources:
    - repoURL: "https://prometheus-community.github.io/helm-charts"
      targetRevision: "82.13.0"
      chart: kube-prometheus-stack
      helm:
        valuesObject:
          # Enable Grafana with label for Grafana Operator to manage
          grafana:
            enabled: true
            # Add label so Grafana Operator can discover and manage this instance
            labels:
              dashboards: "grafana"
            # Grafana configuration
            adminPassword: admin
            # Disable authentication for homelab
            grafana.ini:
              auth.anonymous:
                enabled: true
                org_role: Admin
              auth:
                disable_login_form: true
            # Enable persistence with proper security context
            # fsGroup: 472 allows Kubernetes to automatically handle volume permissions
            # without needing a root init container
            persistence:
              enabled: true
              type: pvc
              size: 10Gi
            # CRITICAL: Disable init-chown-data container that runs as root
            # fsGroup handles permissions automatically in Kubernetes
            initChownData:
              enabled: false
            # Pre-installed plugins
            plugins:
              - grafana-piechart-panel
            # Pod security context - fsGroup is critical for volume permissions
            # Grafana runs as user 472, and fsGroup 472 allows access to PVCs
            podSecurityContext:
              runAsNonRoot: true
              runAsUser: 472
              runAsGroup: 472
              fsGroup: 472
              fsGroupChangePolicy: "OnRootMismatch"
              seccompProfile:
                type: RuntimeDefault
            # Container security context
            containerSecurityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              runAsUser: 472
              runAsGroup: 472
              capabilities:
                drop:
                  - ALL
              privileged: false
              readOnlyRootFilesystem: false

          # Prometheus Operator configuration
          prometheusOperator:
            admissionWebhooks:
              patch:
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 2000
                  fsGroup: 2000
                  seccompProfile:
                    type: RuntimeDefault

          # Prometheus instance configuration
          prometheus:
            prometheusSpec:
              # Accept remote_write from Tempo's metrics generator.
              # Required for traces_service_graph_* and traces_spanmetrics_* metrics
              # that power the Grafana Application Observability service map.
              enableRemoteWriteReceiver: true
              # Enable ServiceMonitor and PodMonitor discovery
              serviceMonitorSelector: {}
              serviceMonitorNamespaceSelector: {}
              podMonitorSelector: {}
              podMonitorNamespaceSelector: {}

              # Storage configuration
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 10Gi

              # Security context
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 2000
                fsGroup: 2000
                seccompProfile:
                  type: RuntimeDefault

              # Container security context
              containers:
                - name: prometheus
                  securityContext:
                    allowPrivilegeEscalation: false
                    runAsNonRoot: true
                    runAsUser: 1000
                    capabilities:
                      drop:
                        - ALL
                    privileged: false
                    readOnlyRootFilesystem: true

          # Alertmanager configuration
          alertmanager:
            alertmanagerSpec:
              storage:
                volumeClaimTemplate:
                  spec:
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 2Gi

              # Security context
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 2000
                fsGroup: 2000
                seccompProfile:
                  type: RuntimeDefault

              containers:
                - name: alertmanager
                  securityContext:
                    allowPrivilegeEscalation: false
                    runAsNonRoot: true
                    runAsUser: 1000
                    capabilities:
                      drop:
                        - ALL
                    privileged: false
                    readOnlyRootFilesystem: true

          # Node exporter (DaemonSet)
          nodeExporter:
            enabled: true

          # Kube-state-metrics
          kube-state-metrics:
            securityContext:
              runAsNonRoot: true
              runAsUser: 65534
              fsGroup: 65534
              seccompProfile:
                type: RuntimeDefault

          # Prometheus Node Exporter
          prometheus-node-exporter:
            securityContext:
              runAsNonRoot: true
              runAsUser: 65534
              fsGroup: 65534
              seccompProfile:
                type: RuntimeDefault

    {{- if .Values.bootstrap.istio.enabled }}
    - repoURL: "https://dysnix.github.io/charts"
      targetRevision: "0.3.2"
      chart: raw
      helm:
        valuesObject:
          resources:
            - apiVersion: gateway.networking.k8s.io/v1
              kind: HTTPRoute
              metadata:
                name: prometheus
                namespace: monitoring
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                  link.argocd.argoproj.io/external-link: "https://prom.{{ .Values.global.clusterName }}.dramisinfo.com"
              spec:
                parentRefs:
                  - name: shared-gateway
                    namespace: istio-system
                    sectionName: https
                hostnames:
                  - "prom.{{ .Values.global.clusterName }}.dramisinfo.com"
                rules:
                  - backendRefs:
                      - name: prometheus-kube-prometheus-prometheus
                        port: 9090
    {{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Timeout=600
      - Wait=true
      - PruneEmpty=true
    {{- include "platform-core.defaultRetry" . | nindent 4 }}
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - .spec.rules[].backendRefs[].group
        - .spec.rules[].backendRefs[].kind
        - .spec.rules[].backendRefs[].weight
        - .spec.rules[].matches
        - .spec.parentRefs[].group
        - .spec.parentRefs[].kind
{{- end -}}