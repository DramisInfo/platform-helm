---
# platform-foundations: Security, policy, CRD bootstrapping, and secret management.
# Apps: gateway-api, gatekeeper, cert-manager, external-secret-operator, argo-events
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-foundations
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-200"
spec:
  description: "Security, policy, CRD bootstrapping, and secret management"
  sourceRepos:
    - '*'
  destinations:
    - namespace: default
      server: "https://kubernetes.default.svc"
    - namespace: gatekeeper-system
      server: "https://kubernetes.default.svc"
    - namespace: cert-manager
      server: "https://kubernetes.default.svc"
    - namespace: eso
      server: "https://kubernetes.default.svc"
    - namespace: argo-events
      server: "https://kubernetes.default.svc"
    - namespace: monitoring
      server: "https://kubernetes.default.svc"
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
---
# platform-networking: Service mesh, ingress, and API gateways.
# Apps: istio, envoy-gateway
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-networking
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-200"
spec:
  description: "Service mesh, ingress, and API gateways"
  sourceRepos:
    - '*'
  destinations:
    - namespace: istio-system
      server: "https://kubernetes.default.svc"
    - namespace: envoy-gateway-system
      server: "https://kubernetes.default.svc"
    - namespace: argocd
      server: "https://kubernetes.default.svc"
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
---
# platform-observability: Metrics, logs, traces, and dashboards.
# Apps: prometheus (kube-prometheus-stack), grafana-operator, loki, tempo, beyla
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-200"
spec:
  description: "Metrics, logs, traces, and dashboards"
  sourceRepos:
    - '*'
  destinations:
    - namespace: monitoring
      server: "https://kubernetes.default.svc"
    - namespace: beyla
      server: "https://kubernetes.default.svc"
    - namespace: kube-system
      server: "https://kubernetes.default.svc"
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
---
# platform-infra: Infrastructure automation, control planes, and runtime operators.
# Apps: crossplane, crossplane-config, platform-crossplane-compositions,
#        terraform-operator, kubevela, keda
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-200"
spec:
  description: "Infrastructure automation, control planes, and runtime operators"
  sourceRepos:
    - '*'
  destinations:
    - namespace: crossplane-system
      server: "https://kubernetes.default.svc"
    - namespace: platform-tools
      server: "https://kubernetes.default.svc"
    - namespace: hcp-terraform-operator
      server: "https://kubernetes.default.svc"
    - namespace: vela-system
      server: "https://kubernetes.default.svc"
    - namespace: keda
      server: "https://kubernetes.default.svc"
    - namespace: kube-system
      server: "https://kubernetes.default.svc"
    - namespace: argocd
      server: "https://kubernetes.default.svc"
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
---
# product-workspaces: XProductWorkspace claims discovered from team workspace repos.
# Apps: discovered via SCM Provider ApplicationSet (*-workspace repos)
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: product-workspaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-200"
spec:
  description: "XProductWorkspace claims discovered from team workspace repos"
  sourceRepos:
    - 'https://github.com/DramisInfo/platform-project-workspaces.git'
    - 'https://github.com/DramisInfo/*-workspace.git'
  destinations:
    - namespace: product-workspaces
      server: "https://kubernetes.default.svc"
    - namespace: argocd
      server: "https://kubernetes.default.svc"
    - namespace: platform-tools
      server: "https://kubernetes.default.svc"
    # Argo Events EventBus/EventSource/Sensor bootstrap resources.
    - namespace: argo-events
      server: "https://kubernetes.default.svc"
    - namespace: ""
      server: "https://kubernetes.default.svc"
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
---
# platform-data: Stateful data and messaging infrastructure.
# Apps: cnpg, nats, nack
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-data
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-200"
spec:
  description: "Stateful data and messaging infrastructure"
  sourceRepos:
    - '*'
  destinations:
    - namespace: cnpg-system
      server: "https://kubernetes.default.svc"
    - namespace: nats
      server: "https://kubernetes.default.svc"
    - namespace: monitoring
      server: "https://kubernetes.default.svc"
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
