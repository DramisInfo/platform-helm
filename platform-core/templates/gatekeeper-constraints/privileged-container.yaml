{{- if and .Values.bootstrap.gatekeeper.enabled .Values.bootstrap.gatekeeper.policies.enabled -}}
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sPSPPrivilegedContainer
metadata:
  name: psp-privileged-container
  annotations:
    argocd.argoproj.io/sync-wave: "-90"
spec:
  enforcementAction: {{ .Values.bootstrap.gatekeeper.policies.enforcementAction | default "deny" }}
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces:
      - "*"
    excludedNamespaces:
      {{- if .Values.bootstrap.gatekeeper.policies.excludedNamespaces }}
      {{- toYaml .Values.bootstrap.gatekeeper.policies.excludedNamespaces | nindent 6 }}
      {{- else }}
      - kube-system
      - gatekeeper-system
      - cert-manager
      - istio-system
      - ingress-nginx
      - argocd
      {{- end }}
  {{- if .Values.bootstrap.gatekeeper.policies.exemptImages }}
  parameters:
    exemptImages:
      {{- toYaml .Values.bootstrap.gatekeeper.policies.exemptImages | nindent 6 }}
  {{- end }}
{{- end -}}
