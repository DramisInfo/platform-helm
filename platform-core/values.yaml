global:
  clusterName: "dev"

bootstrap:
  gatewayAPI:
    # Install the Kubernetes Gateway API CRDs from the official kubernetes-sigs release.
    # Must be enabled whenever cert-manager is configured with enableGatewayAPI: true.
    # Runs at sync-wave -115 (before cert-manager at -110 and Crossplane at -112) to ensure
    # CRDs exist before the cert-manager controller starts its Gateway API check.
    enabled: true
    # Gateway API release tag to install (https://github.com/kubernetes-sigs/gateway-api/releases)
    targetRevision: "v1.2.1"
  certManager:
    # Deploy cert-manager via Argo CD (jetstack/cert-manager v1.16.2)
    enabled: true
    # Configure Azure Workload Identity on the cert-manager service account
    # Required for DNS01 challenges via AzureDNS managed identity.
    # NOTE: clientId is intentionally empty here. The cert-manager UMI is created
    # by Crossplane (not Terraform) after cluster bootstrap. Crossplane also patches
    # the cert-manager SA annotation directly, so the Helm chart WI block is only
    # needed as a fallback when a clientId is explicitly provided (e.g., during migration).
    workloadIdentity:
      enabled: true
      # Client ID injected by Crossplane once the cert-manager UMI is created.
      # Leave empty; Crossplane will manage the SA annotation directly.
      clientId: ""
      # Azure tenant ID (global, same for all clusters)
      tenantId: "b66f9c3b-d384-4932-92fd-444edca3620f"
    # Deploy a Let's Encrypt ClusterIssuer (letsencrypt-prd) alongside cert-manager
    # Uses AzureDNS for DNS01 challenge with a managed identity
    clusterIssuer:
      enabled: true
  crossplane:
    enabled: true
    # Azure Workload Identity for the Crossplane controller ServiceAccount.
    # clientId is the Crossplane UMI created by Terraform and written into
    # overlays/<cluster>/patches/crossplane-identity.yaml on every terraform apply.
    # The GitHub Actions post-Arc job binds the federated credential to this UMI.
    workloadIdentity:
      enabled: true
      # Client ID of the Crossplane UMI (populated by Terraform via the overlay patch).
      clientId: ""
      # Azure tenant ID (global, same for all clusters)
      tenantId: "b66f9c3b-d384-4932-92fd-444edca3620f"
    azure:
      # Azure subscription ID where Crossplane will create resources
      subscriptionId: "c1d22d5c-418b-4bd9-ba23-5e806c376b56"
      # Default Azure region for resources created by Crossplane (e.g. UMIs, role assignments)
      location: "canadacentral"
      # Upbound provider-family-azure version tag (applied to all sub-providers)
      providerVersion: "v1.10.0"
      # DNS resource group containing Azure DNS zones (used for cert-manager role assignment)
      dnsResourceGroup: "rg-dns"
    # crossplane-contrib function-patch-and-transform version (Pipeline mode Compositions)
    functionPatchAndTransformVersion: "v0.8.0"
    # crossplane-contrib provider-kubernetes version (patching in-cluster K8s objects from Compositions)
    providerKubernetesVersion: "v0.15.0"
    # Provision the per-cluster cert-manager Managed Identity via Crossplane.
    # Values here are cluster-specific and should be injected via the overlay patch
    # (overlays/<cluster>/patches/platform-core.yaml) rather than set globally.
    certManagerIdentity:
      # Set enabled: true in the cluster overlay patch (overlays/<cluster>/patches/platform-core.yaml)
      # to provision the cert-manager Managed Identity for that cluster.
      # No other values are needed — all fields are fully derived:
      #   resourceGroup  → rg-{clusterName}
      #   identityName   → umi-{clusterName}-certmanager
      #   dnsRoleScope   → /subscriptions/{azure.subscriptionId}/resourceGroups/{azure.dnsResourceGroup}
      #   location       → bootstrap.crossplane.azure.location
      #   oidcIssuer     → observed at runtime from azure-clusterconfig-wi ConfigMap (azure-arc namespace)
      enabled: true
  terraformOperator:
    enabled: true
  externalSecretOperator:
    enabled: true
  cnpg:
    enabled: true
  gatekeeper:
    enabled: true
    policies:
      # Enable policies from the official Gatekeeper Library
      # Uses community-maintained ConstraintTemplates from https://github.com/open-policy-agent/gatekeeper-library
      enabled: true
      # Enforcement action: "deny" blocks violations, "dryrun" logs only
      enforcementAction: deny
      # Namespaces excluded from policy enforcement
      excludedNamespaces:
        - kube-system
        - gatekeeper-system
        - cert-manager
        - istio-system
        - argocd
        - azure-arc
      # Image patterns to exempt from policies (e.g., ["gcr.io/k8s-minikube/*"])
      exemptImages: []
  ingressNginx:
    enabled: false
  monitoring:
    enabled: true
    grafana:
      # List of plugins to pre-install. Can be plugin IDs or full download URLs.
      # Examples:
      # - grafana-github-datasource
      # - https://grafana.com/api/plugins/grafana-github-datasource/versions/v2.3.0/download;grafana-github-datasource
      plugins: []
      # Optional flag to enable preinstall sync (for chart versions that support preinstall sync environment vars)
      # Note: Chart may use GF_PLUGINS_PREINSTALL_SYNC or GF_PLUGINS_INSTALL depending on the version.
      pluginsPreinstallSync: false
      # List of datasources to provision via provisioning file. Provide a list of data source YAML objects.
      # Example:
      # datasources:
      #   - name: GitHub
      #     type: grafana-github-datasource
      #     access: proxy
      #     url: https://api.github.com
      #     jsonData:
      #       ...
      datasources: []
    loki:
      # Loki (log aggregation) + Alloy (log collector) are deployed automatically
      # when bootstrap.monitoring.enabled is true. Loki runs in SingleBinary mode
      # with local filesystem storage. Alloy uses loki.source.kubernetes (Kubernetes
      # API streaming) — no host path mounts, fully Gatekeeper-compliant.
      persistence:
        # Size of the PersistentVolumeClaim for Loki log storage
        size: 10Gi
        # Storage class to use (leave empty for cluster default)
        storageClass: ""
    tempo:
      persistence:
        # Size of the PersistentVolumeClaim for Tempo trace storage
        size: 10Gi
        # Storage class to use (leave empty for cluster default)
        storageClass: ""
  keda:
    enabled: true
  nats:
    enabled: true
    jetstream:
      enabled: true
      # JetStream domain for this cluster. Sets the API routing prefix ($JS.<domain>.API)
      # so clients can target a specific cluster's JetStream in a multi-cluster setup.
      # Defaults to global.clusterName when gateways are enabled and this is empty.
      # Note: domain does NOT isolate the RAFT meta group — that spans all gateway peers.
      # When gateways are enabled, readiness probes are switched to TCP on port 4222
      # so pods become Ready for core NATS even if JetStream is waiting for remote peers.
      domain: ""
      # File storage configuration for JetStream
      fileStore:
        enabled: true
        # Persistent Volume size for file storage
        size: 10Gi
        # Storage class (leave empty for default)
        storageClassName: ""
      # Memory storage configuration for JetStream
      memoryStore:
        enabled: true
        # Maximum size for memory storage
        maxSize: 1Gi
    nack:
      enabled: true
      # NATS URL for NACK controller to connect to
      # Defaults to the NATS service in the same cluster
      natsUrl: ""
    gateway:
      enabled: false
      # Name of this cluster in the gateway mesh (defaults to global.clusterName)
      name: ""
      # List of remote gateways to connect to
      gateways: []
        # Example for multi-cluster setup:
        # - name: "east-cluster"
        #   url: "nats://nats-gateway-east.example.com:7222"
        # - name: "west-cluster"
        #   url: "nats://nats-gateway-west.example.com:7222"
      # External address for other clusters to reach this gateway
      # This should be the LoadBalancer IP/hostname that other clusters can access
      advertise: ""
      # Gateway port (defaults to 7222)
      port: 7222
  envoyGateway:
    # Deploy Envoy Gateway via Argo CD (docker.io/envoyproxy/gateway-helm v1.7.0)
    # Provides a Kubernetes Gateway API-native ingress gateway backed by Envoy.
    # Operates independently from Istio: Envoy Gateway handles north-south traffic;
    # Istio manages east-west service mesh traffic. Both can coexist.
    enabled: false
    # Install the Kubernetes Gateway API CRDs (GatewayClass, Gateway, HTTPRoute, etc.).
    # Disable if another component (e.g., a future Istio upgrade) already manages them.
    installCRDs: true
    # Provision a default GatewayClass and Gateway (Envoy proxy) on startup
    gateway:
      enabled: true
      # Name of the TLS secret in the envoy-gateway-system namespace for HTTPS termination.
      # Leave empty to use the default: envoy-gateway-tls-<global.clusterName>
      # Create this secret externally (e.g., via cert-manager Certificate resource).
      tlsSecret: ""
  kong:
    # Deploy Kong API Gateway via Argo CD (kong/kong 3.0.2, Kong 3.9)
    enabled: false
    # Service type for the Kong proxy service.
    # Use ClusterIP when fronted by Istio gateway (recommended); LoadBalancer for direct external exposure.
    proxy:
      type: ClusterIP
    # Kong Ingress Controller (KIC) — translates Kubernetes Ingress/HTTPRoute/KongPlugin
    # CRDs into Kong route configuration. Enable if managing Kong via Kubernetes resources.
    # Disable if configuring Kong purely via its Admin API or declarative files.
    ingressController:
      enabled: true
      # Restrict the controller to a single namespace (leave empty to watch all namespaces)
      watchNamespace: ""
    # Admin API — exposes Kong's configuration REST API.
    # Automatically enabled as ClusterIP when manager.enabled is true (required for Kong Manager).
    # Set enabled: true independently to also expose it externally via its own VirtualService.
    admin:
      enabled: false
      # Hostname for the Admin API VirtualService.
      # Leave empty to use the default: kong-admin.<global.clusterName>.dramisinfo.com
      host: ""
    # Kong Manager web UI — exposes the Kong Manager dashboard.
    # In Kong OSS the UI is read-only; in Kong Enterprise it is fully featured.
    manager:
      enabled: true
      # Hostname for the Kong Manager VirtualService.
      # Leave empty to use the default: kong-manager.<global.clusterName>.dramisinfo.com
      host: ""
    # Expose a Prometheus ServiceMonitor for scraping Kong metrics
    serviceMonitor:
      enabled: false
    # Istio VirtualService to expose Kong proxy through the shared Istio ingress gateway
    virtualService:
      enabled: true
      # Hostname that routes to the Kong proxy (must match the shared-gateway wildcard).
      # Leave empty to use the default: api.<global.clusterName>.dramisinfo.com
      host: ""
  istio:
    enabled: true
    # Wildcard host pattern for the shared gateway
    # Example: "*.cace-1-dev.dramisinfo.com" or "*.prod.example.com"
    host: "*.{{ .Values.global.clusterName }}.dramisinfo.com"
    # Platform override for the Istio CNI chart.
    # Required for non-standard CNI binary/config paths.
    # Supported values: k3s, k3d, gke, microk8s, minikube, openshift
    # Defaults to k3s if not set.
    platform: k3s
  kubevela:
    # Deploy KubeVela via Argo CD (kubevela/vela-core 1.10.7)
    # KubeVela is an application-centric platform that abstracts workload delivery
    # over Kubernetes using the Open Application Model (OAM).
    enabled: true
    # Number of controller replicas
    replicaCount: 1
    # Enable multi-cluster mode (requires additional cluster registration)
    multicluster:
      enabled: false
    # Maximum number of retained ApplicationRevision objects per application
    applicationRevisionLimit: 2
    # Maximum number of retained DefinitionRevision objects per definition
    definitionRevisionLimit: 2
    # Resource requests and limits for the vela-core controller
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 50m
        memory: 20Mi
